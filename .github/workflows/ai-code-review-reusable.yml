name: AI Code Review (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      pr_url:
        required: true
        type: string
      head_branch:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      repo_full_name:
        required: true
        type: string
        description: 'owner/repo 格式'
    secrets:
      NOTION_API_KEY:
        required: true
      NOTION_DATABASE_ID:
        required: true
      FIX_TASK_DB_ID:
        required: false
      ANTHROPIC_API_KEY:
        required: true
      OPENAI_API_KEY:
        required: true
      BOT_APP_ID:
        required: true
      BOT_PRIVATE_KEY:
        required: true

concurrency:
  group: ai-review-${{ inputs.head_branch }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: AI Code Review
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FIX_TASK_DB_ID: ${{ secrets.FIX_TASK_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BOT_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_URL: ${{ inputs.pr_url }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          REPO_FULL_NAME: ${{ inputs.repo_full_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const sprintDbId = process.env.NOTION_DATABASE_ID;
            const fixTaskDbId = process.env.FIX_TASK_DB_ID;
            const anthropicKey = process.env.ANTHROPIC_API_KEY;
            const openaiKey = process.env.OPENAI_API_KEY;
            const botToken = process.env.BOT_TOKEN;
            const prNumber = parseInt(process.env.PR_NUMBER);
            const prUrl = process.env.PR_URL;
            const headBranch = process.env.HEAD_BRANCH;
            const baseBranch = process.env.BASE_BRANCH;
            const repoFullName = process.env.REPO_FULL_NAME;
            const [repoOwner, repoName] = repoFullName.split('/');

            // ========================================
            // Notion API helpers
            // ========================================
            const notionHeaders = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            async function notionFetch(url, options) {
              for (let attempt = 1; attempt <= 3; attempt++) {
                const res = await fetch(url, options);
                if (res.status === 429 || res.status >= 500) {
                  const wait = attempt * 2000;
                  console.warn(`Notion ${res.status}, retry ${attempt}/3 in ${wait}ms`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                return res;
              }
              console.error(`Notion API failed after 3 retries: ${url}`);
              return { ok: false, json: async () => ({ message: 'max retries exceeded' }) };
            }

            async function queryNotionDb(dbId, filter) {
              const allResults = [];
              let startCursor = undefined;
              do {
                const body = { filter };
                if (startCursor) body.start_cursor = startCursor;
                const res = await notionFetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                  method: 'POST', headers: notionHeaders, body: JSON.stringify(body)
                });
                if (!res.ok) { console.error(`Notion query error:`, await res.json()); break; }
                const page = await res.json();
                allResults.push(...(page.results || []));
                startCursor = page.has_more ? page.next_cursor : undefined;
              } while (startCursor);
              return allResults;
            }

            async function addNotionComment(pageId, richText) {
              await notionFetch('https://api.notion.com/v1/comments', {
                method: 'POST', headers: notionHeaders,
                body: JSON.stringify({ parent: { page_id: pageId }, rich_text: richText })
              });
            }

            // Backward status guard：防止將已完成/已放棄的卡片狀態倒退
            const terminalStatuses = new Set(['DONE', 'ABANDONED', 'FUNC REVIEW', 'FUNC REVIEW FAILED']);

            async function safeUpdateStatus(pageId, newStatus) {
              // Re-fetch current status（因 review loop 可能耗時數分鐘，狀態可能已被人工更新）
              const res = await notionFetch(`https://api.notion.com/v1/pages/${pageId}`, { headers: notionHeaders });
              if (!res.ok) {
                console.warn(`Failed to re-fetch page ${pageId} for status guard, skipping update`);
                return false;
              }
              const page = await res.json();
              const currentStatus = page.properties?.['任務狀態']?.status?.name;
              if (terminalStatuses.has(currentStatus)) {
                console.log(`Status guard: page ${pageId} is "${currentStatus}", skipping update to "${newStatus}"`);
                return false;
              }
              await notionFetch(`https://api.notion.com/v1/pages/${pageId}`, {
                method: 'PATCH', headers: notionHeaders,
                body: JSON.stringify({ properties: { '任務狀態': { status: { name: newStatus } } } })
              });
              console.log(`Status updated: ${pageId} → ${newStatus}`);
              return true;
            }

            // ========================================
            // 1. 從 branch 提取 Task ID，判斷類型
            // ========================================
            const sbMatch = headBranch.match(/SB-(\d+)/i);
            const fixMatch = headBranch.match(/FIX-(\d+)/i);

            if (!sbMatch && !fixMatch) {
              console.log(`Branch "${headBranch}" does not contain SB- or FIX-, skipping AI review`);
              return;
            }

            const taskType = sbMatch ? 'sprint' : 'fix';
            const taskIdNumber = sbMatch ? parseInt(sbMatch[1]) : parseInt(fixMatch[1]);
            const taskPrefix = sbMatch ? 'SB' : 'FIX';
            const taskId = `${taskPrefix}-${taskIdNumber}`;
            console.log(`Task type: ${taskType}, Task ID: ${taskId}`);

            // ========================================
            // 2. 查詢 Notion 卡片 + Review Mode
            // ========================================
            let card = null;
            let cardPageId = null;
            let reviewMode = 'Human Review';
            let notifyPeople = [];

            if (taskType === 'sprint') {
              // 查 Sprint Backlog — 先用 Task ID unique_id 找
              const results = await queryNotionDb(sprintDbId, {
                property: 'Task ID', unique_id: { equals: taskIdNumber }
              });

              if (results.length === 0) {
                console.log(`No Sprint Backlog card found for ${taskId}`);
                return;
              }

              let targetCard = results[0];

              // 若為 Feature Hub → 遍歷 Sub-item 找到正確的 Repo Execution 子卡
              const cardType = targetCard.properties?.['Card Type']?.select?.name;
              if (cardType === 'Feature Hub') {
                const subItems = targetCard.properties['Sub-item']?.relation || [];
                let found = false;
                for (const subRef of subItems) {
                  const subRes = await notionFetch(`https://api.notion.com/v1/pages/${subRef.id}`, { headers: notionHeaders });
                  if (!subRes.ok) continue;
                  const subPage = await subRes.json();
                  const subRepo = subPage.properties?.['GitHub Repo']?.select?.name;
                  const subBranch = subPage.properties?.['GitHub Branch']?.rich_text?.[0]?.plain_text || '';
                  if (subRepo === repoName && subBranch === headBranch) {
                    targetCard = subPage;
                    found = true;
                    console.log(`Found Repo Execution child: ${subRef.id}`);
                    break;
                  }
                }
                if (!found) {
                  console.log(`No matching Repo Execution child for repo=${repoName}, branch=${headBranch}`);
                  return;
                }
              }

              card = targetCard;
              cardPageId = card.id;
              reviewMode = card.properties?.['Review Mode']?.select?.name || 'Human Review';

              // 取得 Tech Reviewer（用於 Clean Pass 通知）
              let techReviewers = card.properties?.['Tech Reviewer']?.people || [];
              if (techReviewers.length === 0) {
                // 嘗試從 Feature Hub parent 繼承
                const parentRel = card.properties?.['Parent item']?.relation || [];
                if (parentRel.length > 0) {
                  const parentRes = await notionFetch(`https://api.notion.com/v1/pages/${parentRel[0].id}`, { headers: notionHeaders });
                  if (parentRes.ok) {
                    const parentPage = await parentRes.json();
                    techReviewers = parentPage.properties?.['Tech Reviewer']?.people || [];
                  }
                }
              }

              // 取得 Developer（用於 Fixed/Failed 通知）
              const developers = card.properties?.['Developer']?.people || [];
              const assignees = card.properties?.['指派給']?.people || [];
              const devUsers = developers.length > 0 ? developers : assignees;

              // 儲存供後續使用
              card._techReviewers = techReviewers;
              card._developers = devUsers;

            } else {
              // Fix Task
              if (!fixTaskDbId) {
                console.log('FIX_TASK_DB_ID not set, skipping Fix Task review');
                return;
              }

              const results = await queryNotionDb(fixTaskDbId, {
                property: 'Fix Task ID', unique_id: { equals: taskIdNumber }
              });

              if (results.length === 0) {
                console.log(`No Fix Task found for ${taskId}`);
                return;
              }

              card = results[0];
              cardPageId = card.id;

              // Fix Task 的 Review Mode 繼承自關聯的 Repo Execution 卡
              const reRelation = card.properties?.['Repo Execution']?.relation || [];
              if (reRelation.length > 0) {
                const reRes = await notionFetch(`https://api.notion.com/v1/pages/${reRelation[0].id}`, { headers: notionHeaders });
                if (reRes.ok) {
                  const rePage = await reRes.json();
                  reviewMode = rePage.properties?.['Review Mode']?.select?.name || 'Human Review';

                  // Tech Reviewer 從 Repo Execution 或其 Feature Hub parent 取得
                  let techReviewers = rePage.properties?.['Tech Reviewer']?.people || [];
                  if (techReviewers.length === 0) {
                    const parentRel = rePage.properties?.['Parent item']?.relation || [];
                    if (parentRel.length > 0) {
                      const parentRes = await notionFetch(`https://api.notion.com/v1/pages/${parentRel[0].id}`, { headers: notionHeaders });
                      if (parentRes.ok) {
                        const parentPage = await parentRes.json();
                        if (parentPage.properties?.['Card Type']?.select?.name === 'Feature Hub') {
                          techReviewers = parentPage.properties?.['Tech Reviewer']?.people || [];
                        }
                      }
                    }
                  }
                  card._techReviewers = techReviewers;
                }
              }

              // Fix Task 的修復者
              const fixers = card.properties?.['修復者']?.people || [];
              card._developers = fixers;
            }

            console.log(`Review Mode: ${reviewMode}`);
            console.log(`Card Page ID: ${cardPageId}`);

            // ========================================
            // 3. 取得 PR diff
            // ========================================
            async function getPRDiff() {
              const diffRes = await fetch(`https://api.github.com/repos/${repoFullName}/pulls/${prNumber}`, {
                headers: {
                  'Authorization': `Bearer ${botToken}`,
                  'Accept': 'application/vnd.github.v3.diff'
                }
              });
              if (!diffRes.ok) {
                console.error(`Failed to get PR diff: ${diffRes.status}`);
                return null;
              }
              return diffRes.text();
            }

            let diff = await getPRDiff();
            if (!diff) {
              console.error('Failed to get PR diff, aborting');
              return;
            }

            // 大型 PR 檢查：超過 50KB 跳過 AI review
            if (diff.length > 50 * 1024) {
              console.log(`PR diff too large (${diff.length} bytes), skipping AI review`);

              // 留 PR comment
              await github.rest.issues.createComment({
                owner: repoOwner, repo: repoName, issue_number: prNumber,
                body: `⚠️ PR diff 過大（${Math.round(diff.length / 1024)}KB），已跳過 AI Review，請進行人工 Code Review`
              });

              // 設定 TECH REVIEW + 通知（因 PR sync 的 TECH REVIEW 邏輯已移除）
              if (taskType === 'sprint') {
                await safeUpdateStatus(cardPageId, 'TECH REVIEW');
              }

              const techReviewers = card._techReviewers || [];
              if (techReviewers.length > 0) {
                const richText = [];
                for (let i = 0; i < techReviewers.length; i++) {
                  richText.push({ type: 'mention', mention: { type: 'user', user: { id: techReviewers[i].id } } });
                  if (i < techReviewers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                }
                richText.push({ type: 'text', text: { content: ` PR diff 過大，已跳過 AI Review，請進行人工 Code Review\n${prUrl}` } });
                await addNotionComment(cardPageId, richText);
              }
              return;
            }

            // ========================================
            // 4. Reviewer helpers
            // ========================================
            async function getAllPRFiles() {
              const files = [];
              let page = 1;

              while (true) {
                const res = await fetch(`https://api.github.com/repos/${repoFullName}/pulls/${prNumber}/files?per_page=100&page=${page}`, {
                  headers: { 'Authorization': `Bearer ${botToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!res.ok) {
                  throw new Error(`Failed to get PR files list: ${res.status}`);
                }

                const pageData = await res.json();
                files.push(...pageData);
                if (pageData.length < 100) break;
                page++;
              }

              return files;
            }

            function stripJsonFence(text) {
              return (text || '').replace(/^```json?\n?/m, '').replace(/\n?```$/m, '').trim();
            }

            function normalizeWhitespace(text) {
              return String(text || '').replace(/\s+/g, ' ').trim();
            }

            function normalizeFilePath(filePath) {
              return normalizeWhitespace(filePath).replace(/^\.\//, '');
            }

            function normalizeFindingDescription(text) {
              return normalizeWhitespace(text).toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, ' ');
            }

            function parsePatchHunks(patch) {
              if (!patch) return [];

              const hunks = [];
              const lines = patch.split('\n');
              let current = null;

              for (const line of lines) {
                const match = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,(\d+))? @@(.*)$/);
                if (match) {
                  if (current) {
                    current.patch = current.lines.join('\n');
                    delete current.lines;
                    hunks.push(current);
                  }

                  const newStart = Number.parseInt(match[1], 10);
                  const newCount = Number.parseInt(match[2] || '1', 10);
                  current = {
                    header: line,
                    newStart,
                    newEnd: newCount === 0 ? newStart : newStart + newCount - 1,
                    lines: [line]
                  };
                  continue;
                }

                if (current) current.lines.push(line);
              }

              if (current) {
                current.patch = current.lines.join('\n');
                delete current.lines;
                hunks.push(current);
              }

              return hunks;
            }

            function buildScopeMap(prFiles) {
              const map = new Map();
              for (const file of prFiles) {
                const filename = normalizeFilePath(file.filename);
                map.set(filename, {
                  filename,
                  status: file.status,
                  patch: file.patch || '',
                  hunks: parsePatchHunks(file.patch || '')
                });
              }
              return map;
            }

            function isLineInScope(scopeEntry, line) {
              if (!scopeEntry || !Number.isInteger(line) || line < 1) return false;
              if (!scopeEntry.hunks.length) return false;
              return scopeEntry.hunks.some(hunk => line >= hunk.newStart && line <= hunk.newEnd);
            }

            function getRelevantHunk(scopeEntry, line) {
              if (!scopeEntry) return '';
              const matched = scopeEntry.hunks.find(hunk => line >= hunk.newStart && line <= hunk.newEnd);
              return matched?.patch || scopeEntry.patch || '';
            }

            function buildReviewBundle(prFiles) {
              return prFiles
                .filter(file => file.patch)
                .map(file => [
                  `File: ${file.filename}`,
                  `Status: ${file.status}`,
                  'Patch:',
                  file.patch
                ].join('\n'))
                .join('\n\n');
            }

            function buildScopeSummary(scopeMap) {
              return [...scopeMap.values()].map(file => {
                const ranges = file.hunks.map(hunk => `${hunk.newStart}-${hunk.newEnd}`).join(', ');
                return `- ${file.filename}: ${ranges || 'no visible hunk'}`;
              }).join('\n');
            }

            function tryParseJson(text) {
              return JSON.parse(stripJsonFence(text));
            }

            function normalizeReviewIssues(reviewerName, rawIssues, scopeMap) {
              const accepted = [];
              const dropped = [];
              const allowedSeverities = new Set(['error', 'warning']);

              for (const rawIssue of Array.isArray(rawIssues) ? rawIssues : []) {
                const file = normalizeFilePath(rawIssue.file);
                const line = Number.parseInt(rawIssue.line, 10);
                const severity = normalizeWhitespace(rawIssue.severity).toLowerCase();
                const description = normalizeWhitespace(rawIssue.description);
                const suggestion = normalizeWhitespace(rawIssue.suggestion);
                const evidence = normalizeWhitespace(rawIssue.evidence);
                const scopeEntry = scopeMap.get(file);

                let dropReason = '';
                if (!scopeEntry) {
                  dropReason = 'file not in PR scope';
                } else if (!Number.isInteger(line) || line < 1) {
                  dropReason = 'invalid line number';
                } else if (!isLineInScope(scopeEntry, line)) {
                  dropReason = 'line not inside changed hunks';
                } else if (!allowedSeverities.has(severity)) {
                  dropReason = 'severity not allowed';
                } else if (!description || !suggestion || !evidence) {
                  dropReason = 'missing required fields';
                }

                if (dropReason) {
                  dropped.push({
                    reviewer: reviewerName,
                    file,
                    line: Number.isInteger(line) ? line : rawIssue.line,
                    severity,
                    description,
                    reason: dropReason
                  });
                  continue;
                }

                accepted.push({
                  file,
                  line,
                  severity,
                  description,
                  suggestion,
                  evidence
                });
              }

              return { accepted, dropped };
            }

            function enrichFindings(reviewerName, issues, scopeMap) {
              return issues.map((issue, index) => ({
                id: `${reviewerName.toLowerCase()}-${index + 1}`,
                reviewer: reviewerName,
                file: issue.file,
                line: issue.line,
                severity: issue.severity,
                description: issue.description,
                suggestion: issue.suggestion,
                evidence: issue.evidence,
                localPatch: getRelevantHunk(scopeMap.get(issue.file), issue.line)
              }));
            }

            function makeFindingKey(finding) {
              return [
                normalizeFilePath(finding.file),
                Number.parseInt(finding.line, 10),
                normalizeWhitespace(finding.severity).toLowerCase(),
                normalizeFindingDescription(finding.description)
              ].join('|');
            }

            function dedupeDecisionFindings(findings) {
              const merged = new Map();

              for (const finding of findings) {
                const key = makeFindingKey(finding);
                if (!merged.has(key)) {
                  merged.set(key, {
                    ...finding,
                    reviewers: [finding.reviewer],
                    reasons: finding.reason ? [finding.reason] : []
                  });
                  continue;
                }

                const current = merged.get(key);
                if (!current.reviewers.includes(finding.reviewer)) current.reviewers.push(finding.reviewer);
                if (finding.reason && !current.reasons.includes(finding.reason)) current.reasons.push(finding.reason);
              }

              return [...merged.values()];
            }

            function buildReviewResult(reviewerName, rawResult, scopeMap) {
              const { accepted, dropped } = normalizeReviewIssues(reviewerName, rawResult?.issues, scopeMap);
              const summary = normalizeWhitespace(rawResult?.summary) || `${reviewerName} did not provide a summary`;
              return {
                reviewer: reviewerName,
                passed: accepted.length === 0,
                issues: accepted,
                droppedIssues: dropped,
                summary,
                error: !!rawResult?.error
              };
            }

            function formatFindingsForPrompt(findings) {
              return JSON.stringify(findings.map(finding => ({
                finding_id: finding.id,
                file: finding.file,
                line: finding.line,
                severity: finding.severity,
                description: finding.description,
                suggestion: finding.suggestion,
                evidence: finding.evidence,
                local_patch: finding.localPatch
              })), null, 2);
            }

            function indexCritiqueEvaluations(rawEvaluations) {
              const evaluations = new Map();
              for (const evaluation of Array.isArray(rawEvaluations) ? rawEvaluations : []) {
                const findingId = normalizeWhitespace(evaluation.finding_id);
                const verdict = normalizeWhitespace(evaluation.verdict).toLowerCase();
                const reason = normalizeWhitespace(evaluation.reason);
                if (!findingId) continue;
                if (!['accept', 'reject', 'uncertain'].includes(verdict)) continue;
                evaluations.set(findingId, { verdict, reason });
              }
              return evaluations;
            }

            const reviewerPrompt = [
              '你是一位資深 Code Reviewer。請只審查這次 PR patch bundle 中顯示的 changed hunks。',
              '',
              '硬性範圍限制：',
              '- 只能審查 patch bundle 中出現的檔案。',
              '- 只能回報由 changed hunk 直接引入的問題。',
              '- 不要評論未修改的檔案、整體架構、重構建議、或與這次改動無關的技術債。',
              '- 若問題需要依賴未修改程式碼才能成立，只有在 changed hunk 直接觸發該問題時才能回報，且 line 必須錨定在 changed hunk 內。',
              '- 若無法指出 patch 內的證據，就不要回報。',
              '',
              '請用以下 JSON 格式回應（不要加 markdown code fence）：',
              '{',
              '  "passed": true/false,',
              '  "issues": [',
              '    {',
              '      "file": "path/to/file",',
              '      "line": 42,',
              '      "severity": "error|warning",',
              '      "description": "問題描述",',
              '      "suggestion": "最小必要修正建議",',
              '      "evidence": "直接引用 patch 中能證明問題的短片段"',
              '    }',
              '  ],',
              '  "summary": "整體評估摘要"',
              '}',
              '',
              '審查重點：',
              '- 邏輯錯誤與 bug',
              '- 安全性問題',
              '- 效能退化',
              '- 直接由本次改動造成的錯誤處理缺口',
              '',
              '如果沒有 in-scope 問題，passed 設為 true，issues 設為空陣列。'
            ].join('\n');

            const critiquePrompt = [
              '你是一位 reviewer 的 reviewer。你的工作是審核另一位 reviewer 提出的 findings 是否成立。',
              '',
              '硬性規則：',
              '- 只能評估提供給你的 findings，不要新增新的 finding。',
              '- 只能根據該 finding 對應的 local patch 判斷，不要延伸到整個 codebase。',
              '- accept：finding 明確成立且在本次 changed hunk 範圍內。',
              '- reject：finding 不成立、證據不足、或超出本次 changed hunk 範圍。',
              '- uncertain：單靠 patch 無法確認。',
              '',
              '請用以下 JSON 格式回應（不要加 markdown code fence）：',
              '{',
              '  "evaluations": [',
              '    {',
              '      "finding_id": "claude-1",',
              '      "verdict": "accept|reject|uncertain",',
              '      "reason": "一句話說明判斷原因"',
              '    }',
              '  ],',
              '  "summary": "整體評估摘要"',
              '}'
            ].join('\n');

            async function claudeJson(systemPrompt, userContent, maxTokens = 8192) {
              const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'x-api-key': anthropicKey,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json'
                },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-20250514',
                  max_tokens: maxTokens,
                  system: systemPrompt,
                  messages: [{ role: 'user', content: userContent }]
                })
              });

              if (!res.ok) {
                throw new Error(`Claude API error: ${res.status}`);
              }

              const data = await res.json();
              if (data.stop_reason === 'max_tokens') {
                throw new Error('Claude output truncated');
              }
              return tryParseJson(data.content?.[0]?.text || '');
            }

            function extractOpenAIResponseText(data) {
              if (typeof data.output_text === 'string' && data.output_text.trim()) {
                return data.output_text;
              }

              const parts = [];
              for (const item of Array.isArray(data.output) ? data.output : []) {
                for (const contentPart of Array.isArray(item.content) ? item.content : []) {
                  if (contentPart.type === 'output_text' && typeof contentPart.text === 'string') {
                    parts.push(contentPart.text);
                  }
                }
              }
              return parts.join('').trim();
            }

            async function codexJson(systemPrompt, userContent, maxTokens = 8192) {
              const res = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${openaiKey}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: 'gpt-5.4',
                  instructions: systemPrompt,
                  input: [
                    {
                      role: 'user',
                      content: [
                        { type: 'input_text', text: `請只輸出 JSON，不要加 markdown code fence。\n\n${userContent}` }
                      ]
                    }
                  ],
                  max_output_tokens: maxTokens,
                  text: {
                    format: { type: 'json_object' }
                  }
                })
              });

              if (!res.ok) {
                const errorText = (await res.text()).slice(0, 500);
                throw new Error(`OpenAI API error: ${res.status} ${errorText}`);
              }

              const data = await res.json();
              if (data.status === 'failed') {
                throw new Error(`OpenAI response failed: ${JSON.stringify(data.error || {})}`);
              }
              if (data.status === 'incomplete' || data.incomplete_details?.reason === 'max_output_tokens') {
                throw new Error('Codex output truncated');
              }
              return tryParseJson(extractOpenAIResponseText(data));
            }

            async function runReviewer(reviewerName, requestFn, reviewInput, scopeMap) {
              try {
                const rawResult = await requestFn(reviewerPrompt, reviewInput);
                return buildReviewResult(reviewerName, rawResult, scopeMap);
              } catch (e) {
                console.error(`${reviewerName} Reviewer failed: ${e.message}`);
                return {
                  reviewer: reviewerName,
                  passed: true,
                  issues: [],
                  droppedIssues: [],
                  summary: `${reviewerName} error: ${e.message}`,
                  error: true
                };
              }
            }

            async function runCritique(reviewerName, requestFn, targetFindings) {
              if (!targetFindings.length) {
                return { reviewer: reviewerName, evaluations: new Map(), summary: 'No findings to critique', error: false };
              }

              try {
                const rawResult = await requestFn(
                  critiquePrompt,
                  `待審核 findings：\n${formatFindingsForPrompt(targetFindings)}`
                );
                return {
                  reviewer: reviewerName,
                  evaluations: indexCritiqueEvaluations(rawResult?.evaluations),
                  summary: normalizeWhitespace(rawResult?.summary) || `${reviewerName} critique completed`,
                  error: false
                };
              } catch (e) {
                console.error(`${reviewerName} Critique failed: ${e.message}`);
                return {
                  reviewer: reviewerName,
                  evaluations: new Map(),
                  summary: `${reviewerName} critique error: ${e.message}`,
                  error: true
                };
              }
            }

            function formatFindingMarkdown(finding, includeReason = false) {
              const lines = [
                `- \`[${finding.severity}]\` **${finding.file}:${finding.line}** — ${finding.description}`,
                `  證據：${finding.evidence}`,
                `  建議：${finding.suggestion}`
              ];
              if (finding.reviewers?.length > 0) {
                lines.push(`  來源：${finding.reviewers.join(', ')}`);
              }
              if (includeReason && finding.reasons?.length > 0) {
                lines.push(`  判定：${finding.reasons.join(' | ')}`);
              }
              return lines.join('\n');
            }

            const prFilesData = await getAllPRFiles();
            const reviewableFiles = prFilesData.filter(file => typeof file.patch === 'string' && file.patch.trim().length > 0);
            const filesWithoutVisiblePatch = prFilesData
              .filter(file => !file.patch || !file.patch.trim())
              .map(file => file.filename);

            if (reviewableFiles.length === 0) {
              console.log('No reviewable text patches in PR, skipping AI review');
              await github.rest.issues.createComment({
                owner: repoOwner, repo: repoName, issue_number: prNumber,
                body: '⚠️ 此 PR 沒有可供 AI 審查的文字 patch（可能只有 binary / generated changes），請進行人工 Code Review'
              });

              if (taskType === 'sprint') {
                await safeUpdateStatus(cardPageId, 'TECH REVIEW');
              }

              const techReviewers = card._techReviewers || [];
              if (techReviewers.length > 0) {
                const richText = [];
                for (let i = 0; i < techReviewers.length; i++) {
                  richText.push({ type: 'mention', mention: { type: 'user', user: { id: techReviewers[i].id } } });
                  if (i < techReviewers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                }
                richText.push({ type: 'text', text: { content: ` 此 PR 沒有可供 AI 審查的文字 patch，請直接進行人工 Code Review\n${prUrl}` } });
                await addNotionComment(cardPageId, richText);
              }
              return;
            }

            const scopeMap = buildScopeMap(reviewableFiles);
            const reviewInput = [
              '允許審查的檔案與 hunk 範圍：',
              buildScopeSummary(scopeMap),
              '',
              'Patch bundle：',
              buildReviewBundle(reviewableFiles)
            ].join('\n');

            const [claudeRawReview, codexRawReview] = await Promise.all([
              runReviewer('Claude', claudeJson, reviewInput, scopeMap),
              runReviewer('Codex', codexJson, reviewInput, scopeMap)
            ]);

            console.log(`Claude: passed=${claudeRawReview.passed}, issues=${claudeRawReview.issues.length}, error=${claudeRawReview.error}`);
            console.log(`Codex: passed=${codexRawReview.passed}, issues=${codexRawReview.issues.length}, error=${codexRawReview.error}`);

            const reviewerFailures = [claudeRawReview, codexRawReview]
              .filter(result => result.error)
              .map(result => `${result.reviewer}: ${result.summary}`);
            if (reviewerFailures.length > 0) {
              throw new Error(`Reviewer stage failed: ${reviewerFailures.join(' | ')}`);
            }

            const claudeFindings = enrichFindings('Claude', claudeRawReview.issues, scopeMap);
            const codexFindings = enrichFindings('Codex', codexRawReview.issues, scopeMap);

            const [claudeCritique, codexCritique] = await Promise.all([
              runCritique('Claude', claudeJson, codexFindings),
              runCritique('Codex', codexJson, claudeFindings)
            ]);

            const critiqueFailures = [claudeCritique, codexCritique]
              .filter(result => result.error)
              .map(result => `${result.reviewer}: ${result.summary}`);
            if (critiqueFailures.length > 0) {
              throw new Error(`Cross-review stage failed: ${critiqueFailures.join(' | ')}`);
            }

            const agreedFindings = [];
            const disputedFindings = [];
            const rejectedFindings = [];

            for (const finding of claudeFindings) {
              const evaluation = codexCritique.evaluations.get(finding.id);
              if (!evaluation || evaluation.verdict === 'uncertain') {
                disputedFindings.push({ ...finding, reason: evaluation?.reason || 'Codex 無法單靠 patch 確認' });
              } else if (evaluation.verdict === 'accept') {
                agreedFindings.push({ ...finding, reason: evaluation.reason || 'Codex 接受此 finding' });
              } else {
                rejectedFindings.push({ ...finding, reason: evaluation.reason || 'Codex 拒絕此 finding' });
              }
            }

            for (const finding of codexFindings) {
              const evaluation = claudeCritique.evaluations.get(finding.id);
              if (!evaluation || evaluation.verdict === 'uncertain') {
                disputedFindings.push({ ...finding, reason: evaluation?.reason || 'Claude 無法單靠 patch 確認' });
              } else if (evaluation.verdict === 'accept') {
                agreedFindings.push({ ...finding, reason: evaluation.reason || 'Claude 接受此 finding' });
              } else {
                rejectedFindings.push({ ...finding, reason: evaluation.reason || 'Claude 拒絕此 finding' });
              }
            }

            const finalAgreedFindings = dedupeDecisionFindings(agreedFindings);
            const finalDisputedFindings = dedupeDecisionFindings(disputedFindings);
            const finalRejectedFindings = dedupeDecisionFindings(rejectedFindings);

            let finalOutcome = 'pass';
            if (finalAgreedFindings.length > 0) {
              finalOutcome = 'agreed_issues';
            } else if (finalDisputedFindings.length > 0) {
              finalOutcome = 'disputed_only';
            }

            const passed = finalOutcome === 'pass';
            console.log(`\nResult: outcome=${finalOutcome}, agreed=${finalAgreedFindings.length}, disputed=${finalDisputedFindings.length}`);

            // ========================================
            // 5. 留 PR comment（雙 reviewer + 單輪交叉審視）
            // ========================================
            let prComment = `## 🤖 AI Code Review Results\n\n`;
            prComment += `| | 結果 |\n|---|---|\n`;
            prComment += `| Review Mode | ${reviewMode} |\n`;
            prComment += `| Claude Findings | ${claudeFindings.length} |\n`;
            prComment += `| Codex Findings | ${codexFindings.length} |\n`;
            prComment += `| Agreed Findings | ${finalAgreedFindings.length} |\n`;
            prComment += `| Disputed Findings | ${finalDisputedFindings.length} |\n`;
            prComment += `| Rejected Findings | ${finalRejectedFindings.length} |\n`;
            prComment += `| Final | ${
              finalOutcome === 'pass'
                ? '✅ Passed'
                : finalOutcome === 'agreed_issues'
                  ? '❌ Changes Requested'
                  : '⚠️ Human Adjudication Needed'
            } |\n\n`;

            if (filesWithoutVisiblePatch.length > 0) {
              prComment += `> 以下檔案沒有可見 patch，因此未納入 AI review scope：${filesWithoutVisiblePatch.map(file => `\`${file}\``).join(', ')}\n\n`;
            }

            prComment += `### Claude Reviewer\n\n${claudeRawReview.summary}\n\n`;
            if (claudeFindings.length > 0) {
              prComment += `<details><summary>Findings (${claudeFindings.length})</summary>\n\n`;
              for (const finding of claudeFindings) {
                prComment += `${formatFindingMarkdown({ ...finding, reviewers: ['Claude'] })}\n`;
              }
              prComment += `\n</details>\n\n`;
            }
            if (claudeRawReview.droppedIssues.length > 0) {
              prComment += `<details><summary>Dropped as out-of-scope (${claudeRawReview.droppedIssues.length})</summary>\n\n`;
              for (const issue of claudeRawReview.droppedIssues) {
                prComment += `- **${issue.file || 'unknown'}:${issue.line || '?'}** — ${issue.reason}\n`;
              }
              prComment += `\n</details>\n\n`;
            }

            prComment += `### Codex Reviewer\n\n${codexRawReview.summary}\n\n`;
            if (codexFindings.length > 0) {
              prComment += `<details><summary>Findings (${codexFindings.length})</summary>\n\n`;
              for (const finding of codexFindings) {
                prComment += `${formatFindingMarkdown({ ...finding, reviewers: ['Codex'] })}\n`;
              }
              prComment += `\n</details>\n\n`;
            }
            if (codexRawReview.droppedIssues.length > 0) {
              prComment += `<details><summary>Dropped as out-of-scope (${codexRawReview.droppedIssues.length})</summary>\n\n`;
              for (const issue of codexRawReview.droppedIssues) {
                prComment += `- **${issue.file || 'unknown'}:${issue.line || '?'}** — ${issue.reason}\n`;
              }
              prComment += `\n</details>\n\n`;
            }

            prComment += `### Cross-review\n\n`;
            prComment += `- Claude on Codex: ${claudeCritique.summary}\n`;
            prComment += `- Codex on Claude: ${codexCritique.summary}\n\n`;

            if (finalAgreedFindings.length > 0) {
              prComment += `### ✅ Agreed Findings\n\n`;
              for (const finding of finalAgreedFindings) {
                prComment += `${formatFindingMarkdown(finding, true)}\n`;
              }
              prComment += `\n`;
            }

            if (finalDisputedFindings.length > 0) {
              prComment += `### ⚠️ Disputed Findings\n\n`;
              for (const finding of finalDisputedFindings) {
                prComment += `${formatFindingMarkdown(finding, true)}\n`;
              }
              prComment += `\n`;
            }

            await github.rest.issues.createComment({
              owner: repoOwner, repo: repoName, issue_number: prNumber,
              body: prComment
            });

            // ========================================
            // 6. 根據結果 + Review Mode 決定後續
            // ========================================
            if (passed) {
              if (reviewMode === 'AI Only') {
                try {
                  await github.rest.pulls.merge({
                    owner: repoOwner, repo: repoName, pull_number: prNumber,
                    merge_method: 'squash'
                  });
                  console.log('Auto-merged PR (AI Only, Clean Pass)');
                } catch (e) {
                  console.error(`Auto-merge failed: ${e.message}`);
                  const devUsers = card._developers || [];
                  if (devUsers.length > 0) {
                    const richText = [];
                    for (let i = 0; i < devUsers.length; i++) {
                      richText.push({ type: 'mention', mention: { type: 'user', user: { id: devUsers[i].id } } });
                      if (i < devUsers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                    }
                    richText.push({ type: 'text', text: { content: ` AI Review 已通過，但自動 merge 失敗，請手動 merge PR\n${prUrl}` } });
                    await addNotionComment(cardPageId, richText);
                  }
                }
              } else {
                if (taskType === 'sprint') {
                  await safeUpdateStatus(cardPageId, 'TECH REVIEW');
                }

                const techReviewers = card._techReviewers || [];
                if (techReviewers.length > 0) {
                  const richText = [];
                  for (let i = 0; i < techReviewers.length; i++) {
                    richText.push({ type: 'mention', mention: { type: 'user', user: { id: techReviewers[i].id } } });
                    if (i < techReviewers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                  }
                  richText.push({ type: 'text', text: { content: ` AI Review clean pass，請進行人工 Code Review\n${prUrl}` } });
                  await addNotionComment(cardPageId, richText);
                }
              }
            } else if (finalOutcome === 'disputed_only' && reviewMode !== 'AI Only') {
              if (taskType === 'sprint') {
                await safeUpdateStatus(cardPageId, 'TECH REVIEW');
              }

              const techReviewers = card._techReviewers || [];
              if (techReviewers.length > 0) {
                const richText = [];
                for (let i = 0; i < techReviewers.length; i++) {
                  richText.push({ type: 'mention', mention: { type: 'user', user: { id: techReviewers[i].id } } });
                  if (i < techReviewers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                }
                richText.push({ type: 'text', text: { content: ` AI reviewers 對 ${finalDisputedFindings.length} 個問題未達成共識，請人工判定\n${prUrl}` } });
                await addNotionComment(cardPageId, richText);
              }
            } else {
              if (taskType === 'sprint') {
                await safeUpdateStatus(cardPageId, 'DEV IN PROGRESS');
              }

              const devUsers = card._developers || [];
              if (devUsers.length > 0) {
                const richText = [];
                for (let i = 0; i < devUsers.length; i++) {
                  richText.push({ type: 'mention', mention: { type: 'user', user: { id: devUsers[i].id } } });
                  if (i < devUsers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                }

                const message =
                  finalOutcome === 'agreed_issues'
                    ? ` AI Review 發現 ${finalAgreedFindings.length} 個共識問題${finalDisputedFindings.length > 0 ? `，另有 ${finalDisputedFindings.length} 個待人工判定問題` : ''}，請修正後再 Re-request review\n${prUrl}`
                    : ` AI reviewers 對 ${finalDisputedFindings.length} 個問題未達成共識，且目前為 AI Only 流程，請人工檢查後再決定是否繼續\n${prUrl}`;
                richText.push({ type: 'text', text: { content: message } });
                await addNotionComment(cardPageId, richText);
              }
            }

            console.log('AI Code Review completed');

      - name: Fallback on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FIX_TASK_DB_ID: ${{ secrets.FIX_TASK_DB_ID }}
          PR_URL: ${{ inputs.pr_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          REPO_FULL_NAME: ${{ inputs.repo_full_name }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const sprintDbId = process.env.NOTION_DATABASE_ID;
            const fixTaskDbId = process.env.FIX_TASK_DB_ID;
            const prUrl = process.env.PR_URL;
            const prNumber = parseInt(process.env.PR_NUMBER);
            const headBranch = process.env.HEAD_BRANCH;
            const repoFullName = process.env.REPO_FULL_NAME;
            const [repoOwner, repoName] = repoFullName.split('/');

            const notionHeaders = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            // 留 PR comment 說明 AI review 失敗
            const runUrl = `https://github.com/${repoFullName}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: repoOwner, repo: repoName, issue_number: prNumber,
              body: `⚠️ AI Code Review workflow 執行失敗，請進行人工 Code Review\n\nPR: ${prUrl}\n[Workflow logs](${runUrl})`
            });

            // 嘗試設定 TECH REVIEW + 通知（best effort）
            const sbMatch = headBranch.match(/SB-(\d+)/i);
            const fixMatch = headBranch.match(/FIX-(\d+)/i);

            if (sbMatch) {
              const taskIdNumber = parseInt(sbMatch[1]);
              try {
                const queryRes = await fetch(`https://api.notion.com/v1/databases/${sprintDbId}/query`, {
                  method: 'POST', headers: notionHeaders,
                  body: JSON.stringify({ filter: { property: 'Task ID', unique_id: { equals: taskIdNumber } } })
                });
                if (queryRes.ok) {
                  const queryData = await queryRes.json();
                  if (queryData.results?.length > 0) {
                    let card = queryData.results[0];
                    const cardType = card.properties?.['Card Type']?.select?.name;

                    // Feature Hub → find matching Repo Execution child
                    if (cardType === 'Feature Hub') {
                      const subItems = card.properties['Sub-item']?.relation || [];
                      for (const subRef of subItems) {
                        const subRes = await fetch(`https://api.notion.com/v1/pages/${subRef.id}`, { headers: notionHeaders });
                        if (subRes.ok) {
                          const subPage = await subRes.json();
                          const subRepo = subPage.properties?.['GitHub Repo']?.select?.name;
                          const subBranch = subPage.properties?.['GitHub Branch']?.rich_text?.[0]?.plain_text || '';
                          if (subRepo === repoName && subBranch === headBranch) {
                            card = subPage;
                            break;
                          }
                        }
                      }
                    }

                    await fetch(`https://api.notion.com/v1/pages/${card.id}`, {
                      method: 'PATCH', headers: notionHeaders,
                      body: JSON.stringify({ properties: { '任務狀態': { status: { name: 'TECH REVIEW' } } } })
                    });
                    console.log('Fallback: set TECH REVIEW');

                    // 通知 Tech Reviewer
                    let techReviewers = card.properties?.['Tech Reviewer']?.people || [];
                    if (techReviewers.length === 0) {
                      const parentRel = card.properties?.['Parent item']?.relation || [];
                      if (parentRel.length > 0) {
                        const parentRes = await fetch(`https://api.notion.com/v1/pages/${parentRel[0].id}`, { headers: notionHeaders });
                        if (parentRes.ok) {
                          const parentPage = await parentRes.json();
                          techReviewers = parentPage.properties?.['Tech Reviewer']?.people || [];
                        }
                      }
                    }
                    if (techReviewers.length > 0) {
                      const richText = [];
                      for (let i = 0; i < techReviewers.length; i++) {
                        richText.push({ type: 'mention', mention: { type: 'user', user: { id: techReviewers[i].id } } });
                        if (i < techReviewers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                      }
                      richText.push({ type: 'text', text: { content: ` AI Review workflow 失敗，請直接進行人工 Code Review\n${prUrl}` } });
                      await fetch('https://api.notion.com/v1/comments', {
                        method: 'POST', headers: notionHeaders,
                        body: JSON.stringify({ parent: { page_id: card.id }, rich_text: richText })
                      });
                    }
                  }
                }
              } catch (e) {
                console.error(`Fallback failed: ${e.message}`);
              }
            } else if (fixMatch) {
              const fixTaskIdNumber = parseInt(fixMatch[1]);
              try {
                const queryRes = await fetch(`https://api.notion.com/v1/databases/${fixTaskDbId}/query`, {
                  method: 'POST', headers: notionHeaders,
                  body: JSON.stringify({ filter: { property: 'Fix Task ID', unique_id: { equals: fixTaskIdNumber } } })
                });
                if (queryRes.ok) {
                  const queryData = await queryRes.json();
                  if (queryData.results?.length > 0) {
                    const fixCard = queryData.results[0];

                    // 通知修復者
                    const fixers = fixCard.properties?.['修復者']?.people || [];
                    if (fixers.length > 0) {
                      const richText = [];
                      for (let i = 0; i < fixers.length; i++) {
                        richText.push({ type: 'mention', mention: { type: 'user', user: { id: fixers[i].id } } });
                        if (i < fixers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                      }
                      richText.push({ type: 'text', text: { content: ` AI Review workflow 失敗，請直接進行人工 Code Review\n${prUrl}` } });
                      await fetch('https://api.notion.com/v1/comments', {
                        method: 'POST', headers: notionHeaders,
                        body: JSON.stringify({ parent: { page_id: fixCard.id }, rich_text: richText })
                      });
                    }
                    console.log('Fallback: notified Fix Task fixers');
                  }
                }
              } catch (e) {
                console.error(`Fallback (FIX-) failed: ${e.message}`);
              }
            }

            console.log('Fallback handler completed');
