name: Review Fix Task Auto-Creator

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: notion-review-fix-task-scheduler
  cancel-in-progress: false

jobs:
  create-fix-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Create Fix Tasks for Review Issues
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          REVIEW_ISSUE_DB_ID: ${{ secrets.REVIEW_ISSUE_DB_ID }}
          FIX_TASK_DB_ID: ${{ secrets.FIX_TASK_DB_ID }}
          SPRINT_BACKLOG_DB_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const reviewIssueDbId = process.env.REVIEW_ISSUE_DB_ID;
            const fixTaskDbId = process.env.FIX_TASK_DB_ID;

            const notionHeaders = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            async function notionRequest(endpoint, method = 'GET', body = null) {
              const options = { method, headers: notionHeaders };
              if (body) options.body = JSON.stringify(body);
              for (let attempt = 1; attempt <= 3; attempt++) {
                const res = await fetch(`https://api.notion.com/v1${endpoint}`, options);
                if (res.status === 429 || res.status >= 500) {
                  const wait = attempt * 2000;
                  console.warn(`Notion ${res.status} on ${endpoint}, retry ${attempt}/3 in ${wait}ms`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                if (!res.ok) {
                  const err = await res.json();
                  console.error(`Notion API error: ${endpoint}`, err);
                  return null;
                }
                return res.json();
              }
              console.error(`Notion API failed after 3 retries: ${endpoint}`);
              return null;
            }

            async function queryNotionDb(dbId, filter) {
              const allResults = [];
              let startCursor = undefined;
              do {
                const body = { filter };
                if (startCursor) body.start_cursor = startCursor;
                const result = await notionRequest(`/databases/${dbId}/query`, 'POST', body);
                if (!result) break;
                allResults.push(...(result.results || []));
                startCursor = result.has_more ? result.next_cursor : undefined;
              } while (startCursor);
              return allResults;
            }

            // 1. Query Review Issues: 修復者 assigned + status Open
            const issueResults = await queryNotionDb(reviewIssueDbId, {
              and: [
                { property: '修復者', people: { is_not_empty: true } },
                { property: '狀態', status: { equals: 'Open' } }
              ]
            });

            if (issueResults.length === 0) {
              console.log('No Review Issues needing Fix Tasks');
            }

            console.log(`Found ${issueResults.length} Review Issues needing Fix Tasks`);

            for (const issue of issueResults) {
              const issueId = issue.id;
              const issueTitle = issue.properties['問題描述']?.title?.[0]?.plain_text || 'untitled';
              const fixers = issue.properties['修復者']?.people || [];
              const sprintBacklogRelation = issue.properties['Sprint Backlog']?.relation || [];

              // Check if Fix Tasks already exist via relation
              const existingFixTasks = issue.properties['🔧 Fix Tasks']?.relation || [];
              if (existingFixTasks.length > 0) {
                // 補救：如果已有 Fix Task 但狀態仍為 Open，補更新為 Fixing
                const issueStatus = issue.properties['狀態']?.status?.name;
                if (issueStatus === 'Open') {
                  await notionRequest(`/pages/${issueId}`, 'PATCH', {
                    properties: { '狀態': { status: { name: 'Fixing' } } }
                  });
                  console.log(`Remedied: "${issueTitle}" Open → Fixing (had ${existingFixTasks.length} Fix Task(s))`);
                } else {
                  console.log(`Skip: "${issueTitle}" — already has ${existingFixTasks.length} Fix Task(s)`);
                }
                continue;
              }

              if (sprintBacklogRelation.length === 0) {
                console.log(`Skip: "${issueTitle}" — no Sprint Backlog card linked`);
                continue;
              }

              console.log(`Processing: "${issueTitle}"`);
              let fixTaskCreated = false;

              // 2. Collect all Repo Execution cards (expand Feature Hub → Sub-items)
              const repoExecutionCards = [];
              for (const sbRef of sprintBacklogRelation) {
                const sbPage = await notionRequest(`/pages/${sbRef.id}`);
                if (!sbPage) continue;

                const cardType = sbPage.properties?.['Card Type']?.select?.name;

                if (cardType === 'Repo Execution') {
                  const githubRepo = sbPage.properties?.['GitHub Repo']?.select?.name;
                  if (githubRepo) {
                    repoExecutionCards.push({ id: sbRef.id, repo: githubRepo });
                  } else {
                    console.log(`  Skip SB card ${sbRef.id}: no GitHub Repo`);
                  }
                } else if (cardType === 'Feature Hub') {
                  // Expand Feature Hub → find all Sub-item (Repo Execution children)
                  console.log(`  Expanding Feature Hub: ${sbRef.id}`);
                  const subItems = sbPage.properties?.['Sub-item']?.relation || [];
                  for (const subRef of subItems) {
                    const subPage = await notionRequest(`/pages/${subRef.id}`);
                    if (!subPage) continue;
                    const subCardType = subPage.properties?.['Card Type']?.select?.name;
                    const subRepo = subPage.properties?.['GitHub Repo']?.select?.name;
                    if (subCardType === 'Repo Execution' && subRepo) {
                      repoExecutionCards.push({ id: subRef.id, repo: subRepo });
                      console.log(`    Found child Repo Execution: ${subRepo}`);
                    }
                  }
                } else {
                  console.log(`  Skip SB card ${sbRef.id}: Card Type is "${cardType || 'empty'}"`);
                }
              }

              // 3. Create Fix Task for each Repo Execution card
              for (const reCard of repoExecutionCards) {
                console.log(`  Creating Fix Task for repo: ${reCard.repo}`);

                const fixTask = await notionRequest('/pages', 'POST', {
                  parent: { database_id: fixTaskDbId },
                  properties: {
                    '修復項目': { title: [{ text: { content: `[${reCard.repo}] ${issueTitle}` } }] },
                    'Review Issue': { relation: [{ id: issueId }] },
                    'Repo Execution': { relation: [{ id: reCard.id }] },
                    'GitHub Repo': { select: { name: reCard.repo } },
                    '修復者': { people: fixers.map(f => ({ id: f.id })) }
                  }
                });

                if (fixTask) {
                  const fixTaskId = fixTask.properties?.['Fix Task ID']?.unique_id;
                  const fixId = fixTaskId ? `${fixTaskId.prefix}-${fixTaskId.number}` : fixTask.id;
                  console.log(`  Fix Task created: ${fixId}`);
                  fixTaskCreated = true;
                }
              }

              if (!fixTaskCreated) {
                console.log(`  No Fix Task created for "${issueTitle}" — skipping status update`);
                continue;
              }

              // 4. Update Review Issue status → Fixing
              await notionRequest(`/pages/${issueId}`, 'PATCH', {
                properties: {
                  '狀態': { status: { name: 'Fixing' } }
                }
              });

              // 5. Notify fixers via comment
              const richText = [];
              for (let i = 0; i < fixers.length; i++) {
                richText.push({
                  type: 'mention',
                  mention: { type: 'user', user: { id: fixers[i].id } }
                });
                if (i < fixers.length - 1) {
                  richText.push({ type: 'text', text: { content: ' ' } });
                }
              }
              richText.push({
                type: 'text',
                text: { content: ` 已自動建立 Fix Task，請進行修復` }
              });

              await notionRequest('/comments', 'POST', {
                parent: { page_id: issueId },
                rich_text: richText
              });

              console.log(`  Review Issue → Fixing, fixers notified`);
            }

            // ========================================
            // 功能 2：Feature Hub 狀態 cascade
            // ========================================
            const sprintDbId = process.env.SPRINT_BACKLOG_DB_ID;
            if (!sprintDbId) {
              console.log('=== 功能 2：跳過（SPRINT_BACKLOG_DB_ID 未設定）===');
            } else {
              console.log('=== 功能 2：Feature Hub 狀態 cascade ===');

              // --- 2a: FUNC REVIEW FAILED cascade ---
              const failedHubs = await queryNotionDb(sprintDbId, {
                and: [
                  { property: '任務狀態', status: { equals: 'FUNC REVIEW FAILED' } },
                  { property: 'Card Type', select: { equals: 'Feature Hub' } }
                ]
              });

              console.log(`[FUNC REVIEW FAILED] Found ${failedHubs.length} Feature Hubs`);

              for (const hub of failedHubs) {
                const hubTaskIdObj = hub.properties['Task ID'];
                const hubTaskId = hubTaskIdObj?.unique_id ?
                  `${hubTaskIdObj.unique_id.prefix}-${hubTaskIdObj.unique_id.number}` : hub.id;
                const hubTitle = hub.properties['項目']?.title?.[0]?.plain_text || 'untitled';
                console.log(`Processing Feature Hub: ${hubTaskId} - ${hubTitle}`);

                const subItems = hub.properties['Sub-item']?.relation || [];
                for (const subRef of subItems) {
                  const subPage = await notionRequest(`/pages/${subRef.id}`);
                  if (!subPage) continue;
                  if (subPage.properties?.['Card Type']?.select?.name !== 'Repo Execution') continue;

                  const subDevelopers = subPage.properties['Developer']?.people || [];
                  const subAssignees = subPage.properties['指派給']?.people || [];
                  const subPrUrl = subPage.properties['GitHub PR']?.url || '';
                  const subNotifyUsers = subDevelopers.length > 0 ? subDevelopers : subAssignees;

                  // Notify Developer
                  if (subNotifyUsers.length > 0) {
                    const richText = [];
                    for (let i = 0; i < subNotifyUsers.length; i++) {
                      richText.push({ type: 'mention', mention: { type: 'user', user: { id: subNotifyUsers[i].id } } });
                      if (i < subNotifyUsers.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                    }
                    richText.push({ type: 'text', text: { content: ` Feature Hub「${hubTitle}」Function Review 未通過，請進行調整\n原 PR: ${subPrUrl}` } });
                    await notionRequest('/comments', 'POST', { parent: { page_id: subRef.id }, rich_text: richText });
                  }

                  // Reset child status + assign Developer
                  const childProps = { '任務狀態': { status: { name: 'DEV IN PROGRESS' } } };
                  if (subDevelopers.length > 0) {
                    childProps['指派給'] = { people: subDevelopers.map(d => ({ id: d.id })) };
                  }
                  await notionRequest(`/pages/${subRef.id}`, 'PATCH', { properties: childProps });
                  console.log(`  Child reset: ${subRef.id}`);
                }

                // Reset Hub itself
                await notionRequest(`/pages/${hub.id}`, 'PATCH', {
                  properties: { '任務狀態': { status: { name: 'DEV IN PROGRESS' } } }
                });
                console.log(`  Hub ${hubTaskId} → DEV IN PROGRESS`);
              }

              // --- 2b: DONE / ABANDONED cascade（近 60 分鐘內變更的）---
              const recentThreshold = new Date(Date.now() - 60 * 60 * 1000).toISOString();

              for (const cascadeStatus of ['DONE', 'ABANDONED']) {
                const hubs = await queryNotionDb(sprintDbId, {
                  and: [
                    { property: '任務狀態', status: { equals: cascadeStatus } },
                    { property: 'Card Type', select: { equals: 'Feature Hub' } },
                    { timestamp: 'last_edited_time', last_edited_time: { after: recentThreshold } }
                  ]
                });

                for (const hub of hubs) {
                  const subItems = hub.properties['Sub-item']?.relation || [];
                  for (const subRef of subItems) {
                    const subPage = await notionRequest(`/pages/${subRef.id}`);
                    if (!subPage) continue;
                    if (subPage.properties?.['Card Type']?.select?.name !== 'Repo Execution') continue;
                    if (subPage.properties?.['任務狀態']?.status?.name === cascadeStatus) continue;

                    await notionRequest(`/pages/${subRef.id}`, 'PATCH', {
                      properties: { '任務狀態': { status: { name: cascadeStatus } } }
                    });
                    console.log(`  Cascaded ${cascadeStatus} to ${subRef.id}`);
                  }
                }
              }
            }

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Review Fix Task Scheduler workflow failed. Check logs above."
