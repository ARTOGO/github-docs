name: GitHub PR → Notion Sync (Reusable)

on:
  workflow_call:
    inputs:
      pr_action:
        required: true
        type: string
      pr_merged:
        required: true
        type: string
      pr_url:
        required: true
        type: string
      head_branch:
        description: '來源分支（用於提取 Task ID）'
        required: true
        type: string
      base_branch:
        description: '目標分支（用於顯示合併目標）'
        required: true
        type: string
      event_name:
        required: true
        type: string
      review_state:
        required: false
        type: string
        default: ''
      review_author_id:
        description: 'Review 作者的 GitHub user ID'
        required: false
        type: string
        default: ''
      pr_author_id:
        description: 'PR 作者的 GitHub user ID'
        required: false
        type: string
        default: ''
      staging_review_branches:
        description: '合併到這些分支時標記為 STAGING FUNC REVIEW（逗號分隔）'
        required: false
        type: string
        default: 'staging'
      prod_review_branches:
        description: '合併到這些分支時標記為 PROD FUNCTION REVIEW（逗號分隔）'
        required: false
        type: string
        default: 'main,master'
    secrets:
      NOTION_API_KEY:
        required: true
      NOTION_DATABASE_ID:
        required: true
      FIX_TASK_DB_ID:
        required: false
      REVIEW_ISSUE_DB_ID:
        required: false

jobs:
  sync-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Task ID from branch
        id: extract
        run: |
          BRANCH="${{ inputs.head_branch }}"
          echo "Head Branch: $BRANCH"

          if [[ $BRANCH =~ (SB-[0-9]+) ]]; then
            echo "task_type=sprint" >> $GITHUB_OUTPUT
            echo "task_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "task_num=$(echo ${BASH_REMATCH[1]} | sed 's/SB-//')" >> $GITHUB_OUTPUT
            echo "Found Sprint Task: ${BASH_REMATCH[1]}"
          elif [[ $BRANCH =~ (FIX-[0-9]+) ]]; then
            echo "task_type=fix" >> $GITHUB_OUTPUT
            echo "task_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "task_num=$(echo ${BASH_REMATCH[1]} | sed 's/FIX-//')" >> $GITHUB_OUTPUT
            echo "Found Fix Task: ${BASH_REMATCH[1]}"
          else
            echo "No Task ID found in branch name"
            echo "task_type=" >> $GITHUB_OUTPUT
            echo "task_id=" >> $GITHUB_OUTPUT
          fi

      # === Sprint Backlog (SB-) PR Sync ===
      - name: Sync Sprint Backlog task
        if: steps.extract.outputs.task_type == 'sprint'
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TASK_ID: ${{ steps.extract.outputs.task_id }}
          TASK_NUM: ${{ steps.extract.outputs.task_num }}
          PR_URL: ${{ inputs.pr_url }}
          PR_ACTION: ${{ inputs.pr_action }}
          PR_MERGED: ${{ inputs.pr_merged }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          EVENT_NAME: ${{ inputs.event_name }}
          REVIEW_STATE: ${{ inputs.review_state }}
          REVIEW_AUTHOR_ID: ${{ inputs.review_author_id }}
          PR_AUTHOR_ID: ${{ inputs.pr_author_id }}
          STAGING_REVIEW_BRANCHES: ${{ inputs.staging_review_branches }}
          PROD_REVIEW_BRANCHES: ${{ inputs.prod_review_branches }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const databaseId = process.env.NOTION_DATABASE_ID;
            const taskId = process.env.TASK_ID;
            const taskNum = parseInt(process.env.TASK_NUM);
            const prUrl = process.env.PR_URL;
            const prAction = process.env.PR_ACTION;
            const prMerged = process.env.PR_MERGED === 'true';
            const headBranch = process.env.HEAD_BRANCH || '';
            const baseBranch = process.env.BASE_BRANCH || '';
            const eventName = process.env.EVENT_NAME;
            const reviewState = process.env.REVIEW_STATE;
            const reviewAuthorId = process.env.REVIEW_AUTHOR_ID;
            const prAuthorId = process.env.PR_AUTHOR_ID;
            const stagingBranches = (process.env.STAGING_REVIEW_BRANCHES || 'staging').split(',').map(b => b.trim());
            const prodBranches = (process.env.PROD_REVIEW_BRANCHES || 'main,master').split(',').map(b => b.trim());

            // --- Notion API helper ---
            async function notion(endpoint, method = 'GET', body = null) {
              const opts = {
                method,
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                }
              };
              if (body) opts.body = JSON.stringify(body);
              const res = await fetch(`https://api.notion.com/v1${endpoint}`, opts);
              return res;
            }

            async function addComment(pageId, users, message, linkUrl) {
              const richText = [];
              for (let i = 0; i < users.length; i++) {
                richText.push({ type: 'mention', mention: { type: 'user', user: { id: users[i].id } } });
                if (i < users.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
              }
              richText.push({ type: 'text', text: { content: ` ${message}\n` } });
              if (linkUrl) {
                richText.push({ type: 'text', text: { content: linkUrl, link: { url: linkUrl } } });
              }
              await notion('/comments', 'POST', { parent: { page_id: pageId }, rich_text: richText });
            }

            console.log(`Event: ${eventName}, Action: ${prAction}, Review State: ${reviewState}, Merged: ${prMerged}`);

            // 1. Find page
            const queryRes = await notion(`/databases/${databaseId}/query`, 'POST', {
              filter: { property: 'Task ID', unique_id: { equals: taskNum } }
            });
            const data = await queryRes.json();

            if (!data.results?.length) {
              console.log(`No page found for ${taskId}`);
              return;
            }

            let page = data.results[0];
            let pageId = page.id;
            const currentStatusRaw = page.properties['任務狀態']?.status?.name;
            const cardType = page.properties['Card Type']?.select?.name;
            let featureHubPage = null;
            console.log(`Found: ${pageId}, Status: ${currentStatusRaw}, Card Type: ${cardType}`);

            // Handle Feature Hub → find child Repo Execution for this repo
            if (cardType === 'Feature Hub') {
              featureHubPage = page;
              const repoName = context.repo.repo;
              const subItems = page.properties['Sub-item']?.relation || [];
              let found = false;

              for (const subRef of subItems) {
                const subRes = await notion(`/pages/${subRef.id}`);
                const subPage = await subRes.json();
                const subCardType = subPage.properties?.['Card Type']?.select?.name;
                const subRepo = subPage.properties?.['GitHub Repo']?.select?.name;

                if (subCardType === 'Repo Execution' && subRepo === repoName) {
                  page = subPage;
                  pageId = subPage.id;
                  found = true;
                  console.log(`Feature Hub → found child Repo Execution for ${repoName}: ${pageId}`);
                  break;
                }
              }

              if (!found) {
                console.warn(`⚠️ Feature Hub ${pageId} has no child Repo Execution for repo "${repoName}" — PR sync skipped. Check Sub-item relations.`);
                return;
              }
            } else if (cardType !== 'Repo Execution') {
              console.log(`Skipping: Card Type "${cardType || 'empty'}" is not Repo Execution or Feature Hub`);
              return;
            }

            const currentStatus = page.properties['任務狀態']?.status?.name;

            // 2. People (inherit from Feature Hub if child has none)
            let techReviewers = page.properties['Tech Reviewer']?.people || [];
            let funcReviewers = page.properties['Func. Reviewer']?.people || [];
            const developers = page.properties['Developer']?.people || [];
            const assignees = page.properties['指派給']?.people || [];

            if (featureHubPage) {
              if (funcReviewers.length === 0) {
                funcReviewers = featureHubPage.properties['Func. Reviewer']?.people || [];
                if (funcReviewers.length > 0) console.log(`Inherited Func. Reviewer from Feature Hub`);
              }
              if (techReviewers.length === 0) {
                techReviewers = featureHubPage.properties['Tech Reviewer']?.people || [];
                if (techReviewers.length > 0) console.log(`Inherited Tech Reviewer from Feature Hub`);
              }
            }

            // 3. Determine action
            let newStatus = null;
            let prStatus = null;
            let notifyUsers = [];
            let notifyMessage = '';

            if (eventName === 'pull_request_review') {
              if (reviewAuthorId && prAuthorId && reviewAuthorId === prAuthorId) {
                console.log('⏭️ Review author = PR author, skipping');
                return;
              }
              if (reviewState === 'changes_requested' || reviewState === 'commented') {
                newStatus = 'DEV IN PROGRESS';
                notifyUsers = developers.length > 0 ? developers : assignees;
                const reason = reviewState === 'changes_requested' ? 'Tech Review 未通過' : 'Tech Reviewer 有留言需要回應';
                notifyMessage = `${reason}，請查看 PR 並進行處理，完成後請點擊 "Re-request review"`;
              } else if (reviewState === 'approved') {
                console.log('Approved — waiting for merge');
                return;
              }
            } else if (eventName === 'pull_request') {
              if (prAction === 'opened' || prAction === 'reopened') {
                newStatus = 'TECH REVIEW';
                prStatus = 'Open';
                notifyUsers = techReviewers;
                notifyMessage = 'PR 已開啟，請進行 Code Review';
              } else if (prAction === 'review_requested') {
                if (currentStatus === 'DEV IN PROGRESS') {
                  newStatus = 'TECH REVIEW';
                  notifyUsers = techReviewers;
                  notifyMessage = '開發者已修改完成，請再次進行 Code Review';
                } else {
                  console.log('Re-request but status ≠ DEV IN PROGRESS, skipping');
                  return;
                }
              } else if (prAction === 'closed') {
                if (prMerged) {
                  prStatus = 'Merged';
                  if (stagingBranches.includes(baseBranch)) {
                    newStatus = 'STAGING FUNC REVIEW';
                    notifyUsers = funcReviewers;
                    notifyMessage = `PR 已合併到 ${baseBranch}，請進行 Staging 功能驗證`;
                  } else if (prodBranches.includes(baseBranch)) {
                    newStatus = 'PROD FUNCTION REVIEW';
                    notifyUsers = funcReviewers;
                    notifyMessage = `PR 已合併到 ${baseBranch}，請進行 Production 功能驗證`;
                  } else {
                    console.log(`Merged to ${baseBranch} — only updating PR status`);
                  }
                } else {
                  newStatus = 'DEV IN PROGRESS';
                  prStatus = 'Closed';
                }
              }
            }

            // 4. Update
            const updateProps = {};
            if (prAction === 'opened' || prAction === 'reopened' || prAction === 'closed') {
              updateProps['GitHub PR'] = { url: prUrl };
            }
            if (prStatus) updateProps['PR Status'] = { select: { name: prStatus } };
            if (newStatus) updateProps['任務狀態'] = { status: { name: newStatus } };

            if (Object.keys(updateProps).length > 0) {
              const res = await notion(`/pages/${pageId}`, 'PATCH', { properties: updateProps });
              if (res.ok) console.log(`Updated: Status=${newStatus}, PR Status=${prStatus}`);
              else console.error('Update failed:', await res.json());
            }

            // 5. Notify
            if (notifyUsers.length > 0 && notifyMessage) {
              await addComment(pageId, notifyUsers, notifyMessage, prUrl);
              console.log(`Notified: ${notifyUsers.map(u => u.name || u.id).join(', ')}`);
            }

            // 6. Feature Hub status rollup
            const rollupStatuses = ['STAGING FUNC REVIEW', 'PROD FUNCTION REVIEW', 'DONE'];
            if (newStatus && rollupStatuses.includes(newStatus)) {
              // Find parent Feature Hub (either we already have it, or check Parent item)
              let hubPage = featureHubPage;
              if (!hubPage) {
                const parentRel = page.properties['Parent item']?.relation || [];
                if (parentRel.length > 0) {
                  const parentRes = await notion(`/pages/${parentRel[0].id}`);
                  if (parentRes.ok) {
                    const parentPage = await parentRes.json();
                    if (parentPage.properties?.['Card Type']?.select?.name === 'Feature Hub') {
                      hubPage = parentPage;
                    }
                  }
                }
              }

              if (hubPage) {
                console.log(`Checking Feature Hub rollup for: ${hubPage.id}`);
                const allChildren = hubPage.properties?.['Sub-item']?.relation || [];
                const statusRank = {
                  'NOT STARTED': 0, 'PENDING': 1, 'UI DESIGN': 2,
                  'IN PROGRESS': 3, 'DEV IN PROGRESS': 3,
                  'TECH REVIEW': 4, 'FUNC REVIEW FAILED': 3,
                  'STAGING FUNC REVIEW': 6, 'PROD FUNCTION REVIEW': 7,
                  'DEPLOY PENDING': 8, 'PHASED DONE': 9, 'DONE': 10,
                  'ABANDONED': 10
                };
                const targetRank = statusRank[newStatus] || 0;

                let allAtOrBeyond = true;
                for (const childRef of allChildren) {
                  if (childRef.id === pageId) continue; // skip self
                  const childRes = await notion(`/pages/${childRef.id}`);
                  if (!childRes.ok) continue;
                  const childPage = await childRes.json();
                  const childCardType = childPage.properties?.['Card Type']?.select?.name;
                  if (childCardType !== 'Repo Execution') continue;
                  const childStatus = childPage.properties?.['任務狀態']?.status?.name;
                  const childRank = statusRank[childStatus] || 0;
                  console.log(`  Sibling ${childRef.id}: ${childStatus} (rank ${childRank})`);
                  if (childRank < targetRank) {
                    allAtOrBeyond = false;
                    break;
                  }
                }

                if (allAtOrBeyond) {
                  console.log(`All children at ${newStatus} or beyond → updating Feature Hub`);
                  const hubUpdateRes = await notion(`/pages/${hubPage.id}`, 'PATCH', {
                    properties: { '任務狀態': { status: { name: newStatus } } }
                  });
                  if (hubUpdateRes.ok) {
                    console.log(`Feature Hub updated to ${newStatus}`);
                    // Notify Func. Reviewer on Feature Hub if entering FUNC REVIEW stage
                    const hubFuncReviewers = hubPage.properties?.['Func. Reviewer']?.people || [];
                    if (hubFuncReviewers.length > 0 && (newStatus === 'STAGING FUNC REVIEW' || newStatus === 'PROD FUNCTION REVIEW')) {
                      const hubTitle = hubPage.properties['項目']?.title?.[0]?.plain_text || 'untitled';
                      const stage = newStatus === 'STAGING FUNC REVIEW' ? 'Staging' : 'Production';
                      await addComment(hubPage.id, hubFuncReviewers,
                        `Feature Hub「${hubTitle}」所有 Repo 已合併，請進行 ${stage} 功能驗證`, null);
                      console.log(`Notified Feature Hub Func. Reviewer`);
                    }
                  }
                } else {
                  console.log(`Not all children at ${newStatus} yet, Feature Hub stays`);
                }
              }
            }

      # === Fix Task (FIX-) PR Sync ===
      - name: Sync Fix Task
        if: steps.extract.outputs.task_type == 'fix'
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          FIX_TASK_DB_ID: ${{ secrets.FIX_TASK_DB_ID }}
          REVIEW_ISSUE_DB_ID: ${{ secrets.REVIEW_ISSUE_DB_ID }}
          TASK_ID: ${{ steps.extract.outputs.task_id }}
          TASK_NUM: ${{ steps.extract.outputs.task_num }}
          PR_URL: ${{ inputs.pr_url }}
          PR_ACTION: ${{ inputs.pr_action }}
          PR_MERGED: ${{ inputs.pr_merged }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          EVENT_NAME: ${{ inputs.event_name }}
          REVIEW_STATE: ${{ inputs.review_state }}
          REVIEW_AUTHOR_ID: ${{ inputs.review_author_id }}
          PR_AUTHOR_ID: ${{ inputs.pr_author_id }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const fixTaskDbId = process.env.FIX_TASK_DB_ID;
            const reviewIssueDbId = process.env.REVIEW_ISSUE_DB_ID;
            const taskId = process.env.TASK_ID;
            const taskNum = parseInt(process.env.TASK_NUM);
            const prUrl = process.env.PR_URL;
            const prAction = process.env.PR_ACTION;
            const prMerged = process.env.PR_MERGED === 'true';
            const baseBranch = process.env.BASE_BRANCH || '';
            const eventName = process.env.EVENT_NAME;
            const reviewState = process.env.REVIEW_STATE;
            const reviewAuthorId = process.env.REVIEW_AUTHOR_ID;
            const prAuthorId = process.env.PR_AUTHOR_ID;

            if (!fixTaskDbId) {
              console.log('FIX_TASK_DB_ID not set, skipping Fix Task sync');
              return;
            }

            // --- Notion API helper ---
            async function notion(endpoint, method = 'GET', body = null) {
              const opts = {
                method,
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                }
              };
              if (body) opts.body = JSON.stringify(body);
              const res = await fetch(`https://api.notion.com/v1${endpoint}`, opts);
              return res;
            }

            async function addComment(pageId, users, message, linkUrl) {
              const richText = [];
              for (let i = 0; i < users.length; i++) {
                richText.push({ type: 'mention', mention: { type: 'user', user: { id: users[i].id } } });
                if (i < users.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
              }
              richText.push({ type: 'text', text: { content: ` ${message}\n` } });
              if (linkUrl) {
                richText.push({ type: 'text', text: { content: linkUrl, link: { url: linkUrl } } });
              }
              await notion('/comments', 'POST', { parent: { page_id: pageId }, rich_text: richText });
            }

            console.log(`[Fix Task] Event: ${eventName}, Action: ${prAction}, Merged: ${prMerged}`);

            // 1. Find Fix Task by ID
            const queryRes = await notion(`/databases/${fixTaskDbId}/query`, 'POST', {
              filter: { property: 'Fix Task ID', unique_id: { equals: taskNum } }
            });
            const data = await queryRes.json();

            if (!data.results?.length) {
              console.log(`No Fix Task found for ${taskId}`);
              return;
            }

            const fixTask = data.results[0];
            const fixTaskPageId = fixTask.id;
            const currentStatus = fixTask.properties['狀態']?.status?.name;
            const fixers = fixTask.properties['修復者']?.people || [];
            console.log(`Found Fix Task: ${fixTaskPageId}, Status: ${currentStatus}`);

            // 2. Determine action
            let newStatus = null;
            let fixPrStatus = null;
            let notifyUsers = [];
            let notifyMessage = '';

            if (eventName === 'pull_request_review') {
              if (reviewAuthorId && prAuthorId && reviewAuthorId === prAuthorId) {
                console.log('⏭️ Review author = PR author, skipping');
                return;
              }
              if (reviewState === 'changes_requested' || reviewState === 'commented') {
                notifyUsers = fixers;
                const reason = reviewState === 'changes_requested' ? 'Tech Review 未通過' : 'Reviewer 有留言需要回應';
                notifyMessage = `${reason}，請查看 Fix PR 並進行處理`;
              } else if (reviewState === 'approved') {
                console.log('Approved — waiting for merge');
                return;
              }
            } else if (eventName === 'pull_request') {
              if (prAction === 'opened' || prAction === 'reopened') {
                fixPrStatus = 'Open';
              } else if (prAction === 'closed') {
                if (prMerged) {
                  fixPrStatus = 'Merged';
                  newStatus = 'Tech Fixed';
                  notifyMessage = `Fix PR 已合併到 ${baseBranch}，修復完成`;
                } else {
                  fixPrStatus = 'Closed';
                }
              }
            }

            // 3. Update Fix Task
            const updateProps = {};
            if (prAction === 'opened' || prAction === 'reopened' || prAction === 'closed') {
              updateProps['Fix PR'] = { url: prUrl };
            }
            if (fixPrStatus) updateProps['Fix PR Status'] = { select: { name: fixPrStatus } };
            if (newStatus) updateProps['狀態'] = { status: { name: newStatus } };

            if (Object.keys(updateProps).length > 0) {
              const res = await notion(`/pages/${fixTaskPageId}`, 'PATCH', { properties: updateProps });
              if (res.ok) console.log(`Updated Fix Task: Status=${newStatus}, PR Status=${fixPrStatus}`);
              else console.error('Update failed:', await res.json());
            }

            // 4. Notify on Fix Task page
            if (notifyUsers.length > 0 && notifyMessage) {
              await addComment(fixTaskPageId, notifyUsers, notifyMessage, prUrl);
              console.log(`Notified fixers: ${notifyUsers.map(u => u.name || u.id).join(', ')}`);
            }

            // 5. Check if all Fix Tasks for the Review Issue are Tech Fixed → auto-close Review Issue
            if (newStatus === 'Tech Fixed' && reviewIssueDbId) {
              const reviewIssueRelation = fixTask.properties['Review Issue']?.relation || [];

              for (const riRef of reviewIssueRelation) {
                console.log(`Checking Review Issue: ${riRef.id}`);

                // Get the Review Issue to find all its Fix Tasks
                const riPage = await (await notion(`/pages/${riRef.id}`)).json();
                const allFixTaskRefs = riPage.properties?.['🔧 Fix Tasks']?.relation || [];

                if (allFixTaskRefs.length === 0) continue;

                // Check each Fix Task's status
                let allDone = true;
                for (const ftRef of allFixTaskRefs) {
                  const ftPage = await (await notion(`/pages/${ftRef.id}`)).json();
                  const ftStatus = ftPage.properties?.['狀態']?.status?.name;
                  console.log(`  Fix Task ${ftRef.id}: ${ftStatus}`);
                  if (ftStatus !== 'Tech Fixed') {
                    allDone = false;
                    break;
                  }
                }

                if (allDone) {
                  console.log(`All Fix Tasks done → Review Issue → Tech Fixed`);
                  await notion(`/pages/${riRef.id}`, 'PATCH', {
                    properties: { '狀態': { status: { name: 'Tech Fixed' } } }
                  });

                  // Notify reporter (報告者) on Review Issue
                  const reporter = riPage.properties?.['報告者']?.created_by;
                  if (reporter) {
                    await addComment(riRef.id, [reporter], '所有 Fix Task 已完成修復，請進行驗證', null);
                  }
                } else {
                  console.log(`Not all Fix Tasks done yet, Review Issue stays as-is`);
                }
              }
            }
