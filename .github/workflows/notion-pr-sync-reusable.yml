name: GitHub PR -> Notion Sync (Reusable)

on:
  workflow_call:
    inputs:
      pr_action:
        required: true
        type: string
      pr_merged:
        required: true
        type: string
      pr_url:
        required: true
        type: string
      head_branch:
        description: '來源分支（用於提取 Task ID）'
        required: true
        type: string
      base_branch:
        description: '目標分支（用於顯示合併目標）'
        required: true
        type: string
      event_name:
        required: true
        type: string
      review_state:
        required: false
        type: string
        default: ''
      review_author_id:
        description: 'Review 作者的 GitHub user ID'
        required: false
        type: string
        default: ''
      pr_author_id:
        description: 'PR 作者的 GitHub user ID'
        required: false
        type: string
        default: ''
      staging_review_branches:
        description: '合併到這些分支時標記為 STAGING FUNC REVIEW（逗號分隔）'
        required: false
        type: string
        default: 'staging'
      prod_review_branches:
        description: '合併到這些分支時標記為 PROD FUNCTION REVIEW（逗號分隔）'
        required: false
        type: string
        default: 'main,master'
    secrets:
      NOTION_API_KEY:
        required: true
      NOTION_DATABASE_ID:
        required: true
      REVIEW_ISSUE_DB_ID:
        required: false

concurrency:
  group: notion-pr-sync-${{ inputs.head_branch }}
  cancel-in-progress: false

jobs:
  sync-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Task ID from branch
        id: extract
        env:
          BRANCH: ${{ inputs.head_branch }}
        run: |
          echo "Head Branch: $BRANCH"

          if [[ $BRANCH =~ (SB-[0-9]+) ]]; then
            echo "task_type=sprint" >> $GITHUB_OUTPUT
            echo "task_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "task_num=$(echo ${BASH_REMATCH[1]} | sed 's/SB-//')" >> $GITHUB_OUTPUT
            echo "Found Sprint Task: ${BASH_REMATCH[1]}"
          elif [[ $BRANCH =~ (ISS-[0-9]+) ]]; then
            echo "task_type=review_issue" >> $GITHUB_OUTPUT
            echo "task_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "task_num=$(echo ${BASH_REMATCH[1]} | sed 's/ISS-//')" >> $GITHUB_OUTPUT
            echo "Found Review Issue: ${BASH_REMATCH[1]}"
          else
            echo "No Task ID found in branch name"
            echo "task_type=" >> $GITHUB_OUTPUT
            echo "task_id=" >> $GITHUB_OUTPUT
          fi

      - name: Sync Sprint Backlog task
        if: steps.extract.outputs.task_type == 'sprint'
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TASK_ID: ${{ steps.extract.outputs.task_id }}
          TASK_NUM: ${{ steps.extract.outputs.task_num }}
          PR_URL: ${{ inputs.pr_url }}
          PR_ACTION: ${{ inputs.pr_action }}
          PR_MERGED: ${{ inputs.pr_merged }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          EVENT_NAME: ${{ inputs.event_name }}
          REVIEW_STATE: ${{ inputs.review_state }}
          REVIEW_AUTHOR_ID: ${{ inputs.review_author_id }}
          PR_AUTHOR_ID: ${{ inputs.pr_author_id }}
          STAGING_REVIEW_BRANCHES: ${{ inputs.staging_review_branches }}
          PROD_REVIEW_BRANCHES: ${{ inputs.prod_review_branches }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const databaseId = process.env.NOTION_DATABASE_ID;
            const taskId = process.env.TASK_ID;
            const taskNum = parseInt(process.env.TASK_NUM);
            const prUrl = process.env.PR_URL;
            const prAction = process.env.PR_ACTION;
            const prMerged = process.env.PR_MERGED === 'true';
            const headBranch = process.env.HEAD_BRANCH || '';
            const baseBranch = process.env.BASE_BRANCH || '';
            const eventName = process.env.EVENT_NAME;
            const reviewState = process.env.REVIEW_STATE;
            const reviewAuthorId = process.env.REVIEW_AUTHOR_ID;
            const prAuthorId = process.env.PR_AUTHOR_ID;
            const stagingBranches = (process.env.STAGING_REVIEW_BRANCHES || 'staging').split(',').map(b => b.trim());
            const prodBranches = (process.env.PROD_REVIEW_BRANCHES || 'main,master').split(',').map(b => b.trim());

            async function notion(endpoint, method = 'GET', body = null) {
              const opts = {
                method,
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                }
              };
              if (body) opts.body = JSON.stringify(body);
              for (let attempt = 1; attempt <= 3; attempt++) {
                const res = await fetch(`https://api.notion.com/v1${endpoint}`, opts);
                if (res.status === 429 || res.status >= 500) {
                  const wait = attempt * 2000;
                  console.warn(`Notion ${res.status} on ${endpoint}, retry ${attempt}/3 in ${wait}ms`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                return res;
              }
              console.error(`Notion API failed after 3 retries: ${endpoint}`);
              return { ok: false, json: async () => ({ message: 'max retries exceeded' }) };
            }

            async function addComment(pageId, users, message, linkUrl) {
              const richText = [];
              for (let i = 0; i < users.length; i++) {
                richText.push({ type: 'mention', mention: { type: 'user', user: { id: users[i].id } } });
                if (i < users.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
              }
              richText.push({ type: 'text', text: { content: `${users.length ? ' ' : ''}${message}\n` } });
              if (linkUrl) {
                richText.push({ type: 'text', text: { content: linkUrl, link: { url: linkUrl } } });
              }
              await notion('/comments', 'POST', { parent: { page_id: pageId }, rich_text: richText });
            }

            function getPageTitle(page, fallback = 'untitled') {
              for (const prop of Object.values(page.properties || {})) {
                if (prop?.type === 'title') {
                  const title = (prop.title || []).map(t => t.plain_text || '').join('').trim();
                  if (title) return title;
                }
              }
              return fallback;
            }

            console.log(`Event: ${eventName}, Action: ${prAction}, Review State: ${reviewState}, Merged: ${prMerged}`);

            const queryRes = await notion(`/databases/${databaseId}/query`, 'POST', {
              filter: { property: 'Task ID', unique_id: { equals: taskNum } }
            });
            const data = await queryRes.json();

            if (!data.results?.length) {
              console.log(`No page found for ${taskId}`);
              return;
            }

            let page = data.results[0];
            let pageId = page.id;
            const cardType = page.properties['Card Type']?.select?.name;
            let featureHubPage = null;
            console.log(`Found: ${pageId}, Card Type: ${cardType}`);

            if (cardType === 'Feature Hub') {
              featureHubPage = page;
              const repoName = context.repo.repo;
              const subItems = page.properties['Sub-item']?.relation || [];
              let found = false;

              for (const subRef of subItems) {
                const subRes = await notion(`/pages/${subRef.id}`);
                const subPage = await subRes.json();
                const subCardType = subPage.properties?.['Card Type']?.select?.name;
                const subRepo = subPage.properties?.['GitHub Repo']?.select?.name;
                if (subCardType === 'Repo Execution' && subRepo === repoName) {
                  const subBranch = subPage.properties?.['GitHub Branch']?.rich_text?.[0]?.plain_text || '';
                  if (subBranch && subBranch !== headBranch) {
                    console.log(`  Skipping ${subRef.id}: branch "${subBranch}" != "${headBranch}"`);
                    continue;
                  }
                  page = subPage;
                  pageId = subPage.id;
                  found = true;
                  console.log(`Feature Hub -> child Repo Execution for ${repoName}: ${pageId}`);
                  break;
                }
              }

              if (!found) {
                console.warn(`Feature Hub ${page.id} has no child Repo Execution for repo "${repoName}"`);
                return;
              }
            } else if (cardType !== 'Repo Execution') {
              console.log(`Skipping Card Type "${cardType || 'empty'}"`);
              return;
            }

            const currentStatus = page.properties['任務狀態']?.status?.name;
            let techReviewers = page.properties['Tech Reviewer']?.people || [];
            let funcReviewers = page.properties['Func. Reviewer']?.people || [];
            const developers = page.properties['Developer']?.people || [];
            const assignees = page.properties['指派給']?.people || [];

            if (featureHubPage) {
              if (funcReviewers.length === 0) {
                funcReviewers = featureHubPage.properties['Func. Reviewer']?.people || [];
              }
              if (techReviewers.length === 0) {
                techReviewers = featureHubPage.properties['Tech Reviewer']?.people || [];
              }
            }

            const noBackwardStatuses = ['STAGING FUNC REVIEW', 'PROD FUNCTION REVIEW', 'DONE', 'ABANDONED', 'DEPLOY PENDING', 'PHASED DONE'];

            let newStatus = null;
            let prStatus = null;
            let notifyUsers = [];
            let notifyMessage = '';

            if (eventName === 'pull_request_review') {
              if (reviewAuthorId && prAuthorId && reviewAuthorId === prAuthorId) {
                console.log('Review author = PR author, skipping');
                return;
              }

              if (reviewState === 'changes_requested' || reviewState === 'commented') {
                if (!noBackwardStatuses.includes(currentStatus)) {
                  newStatus = 'DEV IN PROGRESS';
                }
                notifyUsers = developers.length > 0 ? developers : assignees;
                notifyMessage = reviewState === 'changes_requested'
                  ? 'Tech Review 未通過，請查看 PR 並進行處理，完成後請點擊 "Re-request review"'
                  : 'Tech Reviewer 有留言需要回應，請查看 PR 並進行處理，完成後請點擊 "Re-request review"';
              } else if (reviewState === 'approved') {
                console.log('Approved -> waiting for merge');
                return;
              }
            } else if (eventName === 'pull_request') {
              if (prAction === 'opened' || prAction === 'reopened') {
                prStatus = 'Open';
                if (!noBackwardStatuses.includes(currentStatus)) {
                  newStatus = 'TECH REVIEW';
                }
                notifyUsers = techReviewers.length > 0 ? techReviewers : assignees;
                notifyMessage = '收到新的 PR，請進行 Code Review';
              } else if (prAction === 'review_requested') {
                if (currentStatus === 'DEV IN PROGRESS') {
                  newStatus = 'TECH REVIEW';
                  notifyUsers = techReviewers.length > 0 ? techReviewers : assignees;
                  notifyMessage = '開發者已修改完成，請再次進行 Code Review';
                } else {
                  console.log('Re-request but status != DEV IN PROGRESS, skipping');
                  return;
                }
              } else if (prAction === 'closed') {
                if (prMerged) {
                  prStatus = 'Merged';
                  if (stagingBranches.includes(baseBranch)) {
                    newStatus = 'STAGING FUNC REVIEW';
                    notifyUsers = funcReviewers;
                    notifyMessage = `PR 已合併到 ${baseBranch}，請進行 Staging 功能驗證`;
                  } else if (prodBranches.includes(baseBranch)) {
                    newStatus = 'PROD FUNCTION REVIEW';
                    notifyUsers = funcReviewers;
                    notifyMessage = `PR 已合併到 ${baseBranch}，請進行 Production 功能驗證`;
                  } else {
                    console.log(`Merged to ${baseBranch}, only update PR status`);
                  }
                } else {
                  prStatus = 'Closed';
                  if (!noBackwardStatuses.includes(currentStatus)) {
                    newStatus = 'DEV IN PROGRESS';
                  }
                }
              }
            }

            const updateProps = {};
            if (prAction === 'opened' || prAction === 'reopened' || prAction === 'closed') {
              updateProps['GitHub PR'] = { url: prUrl };
            }
            if (prStatus) updateProps['PR Status'] = { select: { name: prStatus } };
            if (newStatus) updateProps['任務狀態'] = { status: { name: newStatus } };

            if (Object.keys(updateProps).length > 0) {
              const res = await notion(`/pages/${pageId}`, 'PATCH', { properties: updateProps });
              if (!res.ok) {
                console.error('Update failed:', await res.json());
              }
            }

            if (notifyMessage) {
              await addComment(pageId, notifyUsers, notifyMessage, prUrl);
            }

            const rollupStatuses = ['STAGING FUNC REVIEW', 'PROD FUNCTION REVIEW', 'DONE'];
            if (newStatus && rollupStatuses.includes(newStatus)) {
              let hubPage = featureHubPage;
              if (!hubPage) {
                const parentRel = page.properties['Parent item']?.relation || [];
                if (parentRel.length > 0) {
                  const parentRes = await notion(`/pages/${parentRel[0].id}`);
                  if (parentRes.ok) {
                    const parentPage = await parentRes.json();
                    if (parentPage.properties?.['Card Type']?.select?.name === 'Feature Hub') {
                      hubPage = parentPage;
                    }
                  }
                }
              }

              if (hubPage) {
                const allChildren = hubPage.properties?.['Sub-item']?.relation || [];
                const statusRank = {
                  'NOT STARTED': 0,
                  'PENDING': 1,
                  'UI DESIGN': 2,
                  'IN PROGRESS': 3,
                  'DEV IN PROGRESS': 3,
                  'TECH REVIEW': 4,
                  'FUNC REVIEW FAILED': 3,
                  'STAGING FUNC REVIEW': 6,
                  'PROD FUNCTION REVIEW': 7,
                  'DEPLOY PENDING': 8,
                  'PHASED DONE': 9,
                  'DONE': 10,
                  'ABANDONED': 10
                };
                const targetRank = statusRank[newStatus] || 0;

                let allAtOrBeyond = true;
                for (const childRef of allChildren) {
                  let childRank;
                  let childStatus;
                  if (childRef.id === pageId) {
                    childStatus = newStatus;
                    childRank = targetRank;
                  } else {
                    const childRes = await notion(`/pages/${childRef.id}`);
                    if (!childRes.ok) continue;
                    const childPage = await childRes.json();
                    if (childPage.properties?.['Card Type']?.select?.name !== 'Repo Execution') continue;
                    childStatus = childPage.properties?.['任務狀態']?.status?.name;
                    childRank = statusRank[childStatus] || 0;
                  }
                  console.log(`Sibling ${childRef.id}: ${childStatus} (${childRank})`);
                  if (childRank < targetRank) {
                    allAtOrBeyond = false;
                    break;
                  }
                }

                if (allAtOrBeyond) {
                  const hubUpdateRes = await notion(`/pages/${hubPage.id}`, 'PATCH', {
                    properties: { '任務狀態': { status: { name: newStatus } } }
                  });
                  if (hubUpdateRes.ok) {
                    const hubFuncReviewers = hubPage.properties?.['Func. Reviewer']?.people || [];
                    if (hubFuncReviewers.length > 0 && (newStatus === 'STAGING FUNC REVIEW' || newStatus === 'PROD FUNCTION REVIEW')) {
                      const hubTitle = getPageTitle(hubPage);
                      const stage = newStatus === 'STAGING FUNC REVIEW' ? 'Staging' : 'Production';
                      await addComment(hubPage.id, hubFuncReviewers, `Feature Hub「${hubTitle}」所有 Repo 已合併，請進行 ${stage} 功能驗證`, null);
                    }
                  }
                }
              }
            }

      - name: Sync Review Issue repair PR
        if: steps.extract.outputs.task_type == 'review_issue'
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          REVIEW_ISSUE_DB_ID: ${{ secrets.REVIEW_ISSUE_DB_ID }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TASK_ID: ${{ steps.extract.outputs.task_id }}
          TASK_NUM: ${{ steps.extract.outputs.task_num }}
          PR_URL: ${{ inputs.pr_url }}
          PR_ACTION: ${{ inputs.pr_action }}
          PR_MERGED: ${{ inputs.pr_merged }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          EVENT_NAME: ${{ inputs.event_name }}
          REVIEW_STATE: ${{ inputs.review_state }}
          REVIEW_AUTHOR_ID: ${{ inputs.review_author_id }}
          PR_AUTHOR_ID: ${{ inputs.pr_author_id }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const reviewIssueDbId = process.env.REVIEW_ISSUE_DB_ID;
            const sprintDbId = process.env.NOTION_DATABASE_ID;
            const issueId = process.env.TASK_ID;
            const issueNum = parseInt(process.env.TASK_NUM);
            const prUrl = process.env.PR_URL;
            const prAction = process.env.PR_ACTION;
            const prMerged = process.env.PR_MERGED === 'true';
            const headBranch = process.env.HEAD_BRANCH || '';
            const baseBranch = process.env.BASE_BRANCH || '';
            const eventName = process.env.EVENT_NAME;
            const reviewState = process.env.REVIEW_STATE;
            const reviewAuthorId = process.env.REVIEW_AUTHOR_ID;
            const prAuthorId = process.env.PR_AUTHOR_ID;
            const repoName = context.repo.repo;

            if (!reviewIssueDbId) {
              console.log('REVIEW_ISSUE_DB_ID not set, skipping Review Issue sync');
              return;
            }

            async function notion(endpoint, method = 'GET', body = null) {
              const opts = {
                method,
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                }
              };
              if (body) opts.body = JSON.stringify(body);
              for (let attempt = 1; attempt <= 3; attempt++) {
                const res = await fetch(`https://api.notion.com/v1${endpoint}`, opts);
                if (res.status === 429 || res.status >= 500) {
                  const wait = attempt * 2000;
                  console.warn(`Notion ${res.status} on ${endpoint}, retry ${attempt}/3 in ${wait}ms`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                return res;
              }
              console.error(`Notion API failed after 3 retries: ${endpoint}`);
              return { ok: false, json: async () => ({ message: 'max retries exceeded' }) };
            }

            async function queryAllPages(dbId, filter = null) {
              const allResults = [];
              let startCursor = undefined;
              do {
                const body = {};
                if (filter) body.filter = filter;
                if (startCursor) body.start_cursor = startCursor;
                const res = await notion(`/databases/${dbId}/query`, 'POST', body);
                if (!res.ok) {
                  console.error(`Query failed:`, await res.json());
                  break;
                }
                const data = await res.json();
                allResults.push(...(data.results || []));
                startCursor = data.has_more ? data.next_cursor : undefined;
              } while (startCursor);
              return allResults;
            }

            async function addComment(pageId, users, message, linkUrl = null) {
              const richText = [];
              for (let i = 0; i < users.length; i++) {
                richText.push({ type: 'mention', mention: { type: 'user', user: { id: users[i].id } } });
                if (i < users.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
              }
              richText.push({ type: 'text', text: { content: `${users.length ? ' ' : ''}${message}\n` } });
              if (linkUrl) {
                richText.push({ type: 'text', text: { content: linkUrl, link: { url: linkUrl } } });
              }
              await notion('/comments', 'POST', { parent: { page_id: pageId }, rich_text: richText });
            }

            function findUniqueIdMatch(page, prefix, number) {
              for (const prop of Object.values(page.properties || {})) {
                const uid = prop?.unique_id;
                if (uid?.prefix === prefix && uid?.number === number) return true;
              }
              return false;
            }

            function hasProp(page, propName) {
              return Boolean(page.properties && Object.prototype.hasOwnProperty.call(page.properties, propName));
            }

            function getRichTextPlain(page, propName) {
              return (page.properties?.[propName]?.rich_text || []).map(t => t.plain_text || '').join('');
            }

            function appendUniqueLine(existing, line) {
              const lines = existing
                .split('\n')
                .map(x => x.trim())
                .filter(Boolean);
              if (!lines.includes(line)) lines.push(line);
              return lines.join('\n').slice(-1900);
            }

            function uniquePeople(users) {
              const seen = new Set();
              return users.filter(user => {
                if (!user?.id || seen.has(user.id)) return false;
                seen.add(user.id);
                return true;
              });
            }

            async function resolveRepoExecutionContext(reviewIssuePage) {
              const affected = reviewIssuePage.properties?.['Affected Repo Execution']?.relation || [];
              for (const ref of affected) {
                const res = await notion(`/pages/${ref.id}`);
                if (!res.ok) continue;
                const page = await res.json();
                const repo = page.properties?.['GitHub Repo']?.select?.name;
                if (repo === repoName) {
                  return page;
                }
              }

              const sprintRefs = reviewIssuePage.properties?.['Sprint Backlog']?.relation || [];
              for (const ref of sprintRefs) {
                const res = await notion(`/pages/${ref.id}`);
                if (!res.ok) continue;
                const page = await res.json();
                const cardType = page.properties?.['Card Type']?.select?.name;
                if (cardType === 'Repo Execution' && page.properties?.['GitHub Repo']?.select?.name === repoName) {
                  return page;
                }
                if (cardType === 'Feature Hub') {
                  const subItems = page.properties?.['Sub-item']?.relation || [];
                  for (const subRef of subItems) {
                    const subRes = await notion(`/pages/${subRef.id}`);
                    if (!subRes.ok) continue;
                    const subPage = await subRes.json();
                    if (subPage.properties?.['Card Type']?.select?.name !== 'Repo Execution') continue;
                    if (subPage.properties?.['GitHub Repo']?.select?.name === repoName) {
                      return subPage;
                    }
                  }
                }
              }

              return null;
            }

            async function resolveFeatureHubPage(repoExecutionPage) {
              if (!repoExecutionPage) return null;
              const parentRel = repoExecutionPage.properties?.['Parent item']?.relation || [];
              if (!parentRel.length) return null;
              const res = await notion(`/pages/${parentRel[0].id}`);
              if (!res.ok) return null;
              const page = await res.json();
              return page.properties?.['Card Type']?.select?.name === 'Feature Hub' ? page : null;
            }

            const allIssues = await queryAllPages(reviewIssueDbId);
            const reviewIssue = allIssues.find(page => findUniqueIdMatch(page, 'ISS', issueNum));
            if (!reviewIssue) {
              console.log(`No Review Issue found for ${issueId}`);
              return;
            }

            const reviewIssuePageId = reviewIssue.id;
            const currentStatus = reviewIssue.properties?.['狀態']?.status?.name || '';
            const issueFixers = reviewIssue.properties?.['修復者']?.people || [];
            const repoExecutionPage = await resolveRepoExecutionContext(reviewIssue);
            const featureHubPage = await resolveFeatureHubPage(repoExecutionPage);

            const developers = repoExecutionPage?.properties?.['Developer']?.people || [];
            const assignees = repoExecutionPage?.properties?.['指派給']?.people || [];
            const techReviewers = uniquePeople([
              ...(repoExecutionPage?.properties?.['Tech Reviewer']?.people || []),
              ...(featureHubPage?.properties?.['Tech Reviewer']?.people || [])
            ]);
            const funcReviewers = uniquePeople([
              ...(repoExecutionPage?.properties?.['Func. Reviewer']?.people || []),
              ...(featureHubPage?.properties?.['Func. Reviewer']?.people || [])
            ]);

            let notifyUsers = [];
            let notifyMessage = '';
            let newStatus = null;
            const updateProps = {};
            const nowIso = new Date().toISOString();

            console.log(`[Review Issue] Event: ${eventName}, Action: ${prAction}, Review State: ${reviewState}, Repo: ${repoName}`);

            if (eventName === 'pull_request_review') {
              if (reviewAuthorId && prAuthorId && reviewAuthorId === prAuthorId) {
                console.log('Review author = PR author, skipping');
                return;
              }
              if (reviewState === 'changes_requested' || reviewState === 'commented') {
                notifyUsers = developers.length > 0
                  ? developers
                  : (assignees.length > 0 ? assignees : issueFixers);
                notifyMessage = reviewState === 'changes_requested'
                  ? 'Repair PR 未通過，請查看 PR 並進行處理'
                  : 'Repair PR 有留言需要回應，請查看 PR 並進行處理';
              } else if (reviewState === 'approved') {
                console.log('Approved -> waiting for merge');
                return;
              }
            } else if (eventName === 'pull_request') {
              if (prAction === 'opened' || prAction === 'reopened') {
                if (!['Verified', 'Fixed', "Won't Fix", 'Duplicate'].includes(currentStatus)) {
                  newStatus = 'Fixing';
                }
                notifyUsers = techReviewers.length > 0
                  ? techReviewers
                  : (assignees.length > 0 ? assignees : []);
                notifyMessage = '收到新的 Repair PR，請進行 Code Review';
              } else if (prAction === 'review_requested') {
                if (!['Verified', 'Fixed', "Won't Fix", 'Duplicate'].includes(currentStatus)) {
                  newStatus = 'Fixing';
                }
                notifyUsers = techReviewers.length > 0
                  ? techReviewers
                  : (assignees.length > 0 ? assignees : []);
                notifyMessage = '修復者已修改完成，請再次進行 Code Review';
              } else if (prAction === 'closed') {
                if (prMerged) {
                  if (hasProp(reviewIssue, 'Resolved Repo Execution') && repoExecutionPage) {
                    const resolved = reviewIssue.properties['Resolved Repo Execution']?.relation || [];
                    const resolvedIds = resolved.map(x => x.id);
                    if (!resolvedIds.includes(repoExecutionPage.id)) resolvedIds.push(repoExecutionPage.id);
                    updateProps['Resolved Repo Execution'] = {
                      relation: resolvedIds.map(id => ({ id }))
                    };
                  }
                }
              }
            }

            if (newStatus && hasProp(reviewIssue, '狀態')) {
              updateProps['狀態'] = { status: { name: newStatus } };
            }
            if (hasProp(reviewIssue, 'Last Repair Sync At')) {
              updateProps['Last Repair Sync At'] = { date: { start: nowIso } };
            }
            if (hasProp(reviewIssue, 'Repair PR URLs')) {
              const existing = getRichTextPlain(reviewIssue, 'Repair PR URLs');
              const stateLabel = prMerged ? 'Merged' : (prAction === 'closed' ? 'Closed' : prAction);
              const line = `[${repoName}] ${stateLabel}: ${prUrl}`;
              updateProps['Repair PR URLs'] = {
                rich_text: [{ text: { content: appendUniqueLine(existing, line) } }]
              };
            }

            if (Object.keys(updateProps).length > 0) {
              const res = await notion(`/pages/${reviewIssuePageId}`, 'PATCH', { properties: updateProps });
              if (!res.ok) {
                console.error('Review Issue update failed:', await res.json());
              }
            }

            if (notifyMessage) {
              await addComment(reviewIssuePageId, notifyUsers, notifyMessage, prUrl);
            }

            if (prMerged && hasProp(reviewIssue, 'Affected Repo Execution') && hasProp(reviewIssue, 'Resolved Repo Execution')) {
              const refreshedRes = await notion(`/pages/${reviewIssuePageId}`);
              if (!refreshedRes.ok) {
                console.error('Failed to refetch Review Issue');
                return;
              }
              const refreshed = await refreshedRes.json();
              const affected = refreshed.properties?.['Affected Repo Execution']?.relation || [];
              const resolved = refreshed.properties?.['Resolved Repo Execution']?.relation || [];
              const affectedIds = affected.map(x => x.id);
              const resolvedIds = new Set(resolved.map(x => x.id));
              const allResolved = affectedIds.length > 0 && affectedIds.every(id => resolvedIds.has(id));

              if (allResolved) {
                const completionProps = {};
                if (hasProp(refreshed, '狀態')) {
                  completionProps['狀態'] = { status: { name: 'Tech Fixed' } };
                }
                if (hasProp(refreshed, 'Last Repair Sync At')) {
                  completionProps['Last Repair Sync At'] = { date: { start: nowIso } };
                }
                if (Object.keys(completionProps).length > 0) {
                  const completeRes = await notion(`/pages/${reviewIssuePageId}`, 'PATCH', { properties: completionProps });
                  if (!completeRes.ok) {
                    console.error('Failed to mark Review Issue Tech Fixed:', await completeRes.json());
                  }
                }
                if (funcReviewers.length > 0) {
                  await addComment(reviewIssuePageId, funcReviewers, '所有受影響 Repo 已完成修復，請進行驗證', null);
                }
              }
            }

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Notion PR Sync workflow failed. Check logs above for details."
          echo "Branch: ${{ inputs.head_branch }}, Action: ${{ inputs.pr_action }}, Event: ${{ inputs.event_name }}"
