name: Notion → GitHub Branch (Reusable)

on:
  workflow_call:
    inputs:
      repo_name:
        description: 'Repository name for Notion filter'
        required: true
        type: string
    secrets:
      NOTION_API_KEY:
        required: true
      NOTION_DATABASE_ID:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      FIX_TASK_DB_ID:
        required: false

jobs:
  create-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Query Notion and Process Tasks
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repo_name }}
          FIX_TASK_DB_ID: ${{ secrets.FIX_TASK_DB_ID }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const databaseId = process.env.NOTION_DATABASE_ID;
            const anthropicKey = process.env.ANTHROPIC_API_KEY;
            const repoName = process.env.REPO_NAME;
            
            // ========================================
            // 功能 1：自動建立 Branch
            // ========================================
            console.log('=== 功能 1：自動建立 Branch ===');
            
            const queryResponse = await fetch(`https://api.notion.com/v1/databases/${databaseId}/query`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${notionKey}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                filter: {
                  and: [
                    {
                      or: [
                        { property: '任務狀態', status: { equals: 'NOT STARTED' } },
                        { property: '任務狀態', status: { equals: 'DEV IN PROGRESS' } }
                      ]
                    },
                    { property: 'GitHub Branch', rich_text: { is_empty: true } },
                    { property: 'GitHub Repo', select: { equals: repoName } },
                    { property: 'Card Type', select: { equals: 'Repo Execution' } }
                  ]
                }
              })
            });
            
            const data = await queryResponse.json();
            console.log(`[Create Branch] Found ${data.results?.length || 0} tasks for ${repoName}`);
            
            for (const page of data.results || []) {
              const taskIdObj = page.properties['Task ID'];
              const taskId = taskIdObj?.unique_id ? 
                `${taskIdObj.unique_id.prefix}-${taskIdObj.unique_id.number}` : null;
              const title = page.properties['項目']?.title?.[0]?.plain_text || 'untitled';
              const taskType = page.properties['任務類型']?.multi_select?.[0]?.name || '🔹 TASK';
              
              if (!taskId) {
                console.log('Skipping page without Task ID');
                continue;
              }
              
              console.log(`Processing: ${taskId} - ${title}`);
              
              // Claude API 翻譯
              let englishName = 'feature';
              try {
                const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: {
                    'x-api-key': anthropicKey,
                    'anthropic-version': '2023-06-01',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 100,
                    messages: [{
                      role: 'user',
                      content: `將以下中文功能名稱翻譯成簡短的英文 snake_case 格式，最多 30 字元，只回傳翻譯結果：\n\n${title}`
                    }]
                  })
                });
                
                const claudeData = await claudeResponse.json();
                englishName = claudeData.content?.[0]?.text?.trim()
                  .toLowerCase()
                  .replace(/[^a-z0-9_]/g, '_')
                  .replace(/_+/g, '_')
                  .substring(0, 30) || 'feature';
              } catch (e) {
                console.log(`Translation failed: ${e.message}`);
              }
              
              // Branch type
              let branchType = 'feat';
              if (taskType.includes('BUG')) branchType = 'fix';
              else if (taskType.includes('專案')) branchType = 'project';
              
              const branchName = `${branchType}/${taskId}_${englishName}`;
              console.log(`Creating branch: ${branchName}`);
              
              // Create branch
              try {
                const defaultBranch = await github.rest.repos.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                
                const ref = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${defaultBranch.data.default_branch}`
                });
                
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/heads/${branchName}`,
                  sha: ref.data.object.sha
                });
                
                console.log(`Branch created: ${branchName}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Branch already exists: ${branchName}`);
                } else {
                  throw e;
                }
              }
              
              // Update Notion
              await fetch(`https://api.notion.com/v1/pages/${page.id}`, {
                method: 'PATCH',
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  properties: {
                    'GitHub Branch': { rich_text: [{ text: { content: branchName } }] }
                  }
                })
              });
              
              console.log(`Updated Notion with branch: ${branchName}`);
            }
            
            // ========================================
            // 功能 2：Function Review 失敗通知
            // ========================================
            console.log('=== 功能 2：Function Review 失敗通知 ===');
            
            const failedQuery = await fetch(`https://api.notion.com/v1/databases/${databaseId}/query`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${notionKey}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                filter: {
                  and: [
                    { property: '任務狀態', status: { equals: 'FUNC REVIEW FAILED' } },
                    { property: 'GitHub Repo', select: { equals: repoName } },
                    { property: 'Card Type', select: { equals: 'Repo Execution' } }
                  ]
                }
              })
            });
            
            const failedData = await failedQuery.json();
            console.log(`[Func Review Failed] Found ${failedData.results?.length || 0} tasks for ${repoName}`);
            
            for (const page of failedData.results || []) {
              const taskIdObj = page.properties['Task ID'];
              const taskId = taskIdObj?.unique_id ?
                `${taskIdObj.unique_id.prefix}-${taskIdObj.unique_id.number}` : null;
              const title = page.properties['項目']?.title?.[0]?.plain_text || 'untitled';
              const developers = page.properties['Developer']?.people || [];
              const assignees = page.properties['指派給']?.people || [];
              const prUrl = page.properties['GitHub PR']?.url || '';

              // 優先通知 Developer，fallback 到指派給
              const notifyUsers = developers.length > 0 ? developers : assignees;

              console.log(`Processing failed review: ${taskId} - ${title}`);

              // 發送通知給 Developer
              if (notifyUsers.length > 0) {
                const richText = [];

                for (let i = 0; i < notifyUsers.length; i++) {
                  richText.push({
                    type: 'mention',
                    mention: {
                      type: 'user',
                      user: { id: notifyUsers[i].id }
                    }
                  });
                  if (i < notifyUsers.length - 1) {
                    richText.push({ type: 'text', text: { content: ' ' } });
                  }
                }

                richText.push({
                  type: 'text',
                  text: { content: ` Function Review 未通過，請進行調整後重新開 PR\n原 PR: ${prUrl}` }
                });

                const commentResponse = await fetch('https://api.notion.com/v1/comments', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${notionKey}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    parent: { page_id: page.id },
                    rich_text: richText
                  })
                });

                if (commentResponse.ok) {
                  console.log(`Notified developers: ${notifyUsers.map(u => u.name || u.id).join(', ')}`);
                } else {
                  const error = await commentResponse.json();
                  console.error('Failed to add comment:', error);
                }
              }

              // 把狀態改回 DEV IN PROGRESS，指派給改為 Developer，清空 PR 相關欄位
              const updateProps = {
                '任務狀態': { status: { name: 'DEV IN PROGRESS' } },
                'PR Status': { select: null },
                'GitHub PR': { url: null }
              };

              // 把指派給改為 Developer
              if (developers.length > 0) {
                updateProps['指派給'] = { people: developers.map(d => ({ id: d.id })) };
              }

              await fetch(`https://api.notion.com/v1/pages/${page.id}`, {
                method: 'PATCH',
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ properties: updateProps })
              });

              console.log(`Reset status to DEV IN PROGRESS, assigned to Developer: ${taskId}`);
            }

            // ========================================
            // 功能 3：為 Fix Task 建立修復分支
            // ========================================
            const fixTaskDbId = process.env.FIX_TASK_DB_ID;
            if (!fixTaskDbId) {
              console.log('=== 功能 3：跳過（FIX_TASK_DB_ID 未設定）===');
            } else {
              console.log('=== 功能 3：為 Fix Task 建立修復分支 ===');

              const fixTaskQuery = await fetch(`https://api.notion.com/v1/databases/${fixTaskDbId}/query`, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${notionKey}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  filter: {
                    and: [
                      { property: 'GitHub Repo', select: { equals: repoName } },
                      { property: 'Fix Branch', rich_text: { is_empty: true } }
                    ]
                  }
                })
              });

              const fixTaskData = await fixTaskQuery.json();
              console.log(`[Fix Task Branch] Found ${fixTaskData.results?.length || 0} Fix Tasks for ${repoName}`);

              for (const fixTask of fixTaskData.results || []) {
                const fixTaskIdObj = fixTask.properties['Fix Task ID'];
                const fixTaskId = fixTaskIdObj?.unique_id ?
                  `${fixTaskIdObj.unique_id.prefix}-${fixTaskIdObj.unique_id.number}` : null;
                const fixTitle = fixTask.properties['修復項目']?.title?.[0]?.plain_text || 'fix';

                if (!fixTaskId) {
                  console.log('Skipping Fix Task without ID');
                  continue;
                }

                console.log(`Processing Fix Task: ${fixTaskId} - ${fixTitle}`);

                // 翻譯修復項目名稱
                let englishName = 'fix';
                try {
                  const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                      'x-api-key': anthropicKey,
                      'anthropic-version': '2023-06-01',
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      model: 'claude-3-haiku-20240307',
                      max_tokens: 100,
                      messages: [{
                        role: 'user',
                        content: `將以下中文修復描述翻譯成簡短的英文 snake_case 格式，最多 30 字元，只回傳翻譯結果：\n\n${fixTitle}`
                      }]
                    })
                  });

                  const claudeData = await claudeResponse.json();
                  englishName = claudeData.content?.[0]?.text?.trim()
                    .toLowerCase()
                    .replace(/[^a-z0-9_]/g, '_')
                    .replace(/_+/g, '_')
                    .substring(0, 30) || 'fix';
                } catch (e) {
                  console.log(`Translation failed: ${e.message}`);
                }

                const fixBranchName = `fix/${fixTaskId}_${englishName}`;
                console.log(`Creating fix branch: ${fixBranchName}`);

                // 從 staging 分支切出（Fix Task 修的是 staging 上的問題）
                try {
                  let baseBranch = 'staging';
                  try {
                    await github.rest.git.getRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/staging`
                    });
                  } catch (e) {
                    // 如果 staging 不存在，用 default branch
                    const repoInfo = await github.rest.repos.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo
                    });
                    baseBranch = repoInfo.data.default_branch;
                    console.log(`staging branch not found, using ${baseBranch}`);
                  }

                  const ref = await github.rest.git.getRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${baseBranch}`
                  });

                  await github.rest.git.createRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `refs/heads/${fixBranchName}`,
                    sha: ref.data.object.sha
                  });

                  console.log(`Fix branch created: ${fixBranchName} (from ${baseBranch})`);
                } catch (e) {
                  if (e.status === 422) {
                    console.log(`Fix branch already exists: ${fixBranchName}`);
                  } else {
                    console.error(`Failed to create fix branch: ${e.message}`);
                    continue;
                  }
                }

                // 回寫 Fix Branch 到 Notion
                await fetch(`https://api.notion.com/v1/pages/${fixTask.id}`, {
                  method: 'PATCH',
                  headers: {
                    'Authorization': `Bearer ${notionKey}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    properties: {
                      'Fix Branch': { rich_text: [{ text: { content: fixBranchName } }] }
                    }
                  })
                });

                console.log(`Updated Fix Task with branch: ${fixBranchName}`);
              }
            }