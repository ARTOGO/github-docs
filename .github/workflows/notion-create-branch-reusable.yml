name: Notion → GitHub Branch (Reusable)

on:
  workflow_call:
    inputs:
      repo_name:
        description: 'Repository name for Notion filter'
        required: true
        type: string
    secrets:
      NOTION_API_KEY:
        required: true
      NOTION_DATABASE_ID:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      FIX_TASK_DB_ID:
        required: false

concurrency:
  group: notion-create-branch-${{ inputs.repo_name }}
  cancel-in-progress: false

jobs:
  create-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Query Notion and Process Tasks
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repo_name }}
          FIX_TASK_DB_ID: ${{ secrets.FIX_TASK_DB_ID }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const databaseId = process.env.NOTION_DATABASE_ID;
            const anthropicKey = process.env.ANTHROPIC_API_KEY;
            const repoName = process.env.REPO_NAME;

            // Notion API helpers (with retry)
            const notionHeaders = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            async function notionFetch(url, options) {
              for (let attempt = 1; attempt <= 3; attempt++) {
                const res = await fetch(url, options);
                if (res.status === 429 || res.status >= 500) {
                  const wait = attempt * 2000;
                  console.warn(`Notion ${res.status}, retry ${attempt}/3 in ${wait}ms`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                return res;
              }
              console.error(`Notion API failed after 3 retries: ${url}`);
              return { ok: false, json: async () => ({ message: 'max retries exceeded' }) };
            }

            async function queryNotionDb(dbId, filter) {
              const allResults = [];
              let startCursor = undefined;
              do {
                const body = { filter };
                if (startCursor) body.start_cursor = startCursor;
                const res = await notionFetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                  method: 'POST', headers: notionHeaders, body: JSON.stringify(body)
                });
                if (!res.ok) { console.error(`Notion query error:`, await res.json()); break; }
                const page = await res.json();
                allResults.push(...(page.results || []));
                startCursor = page.has_more ? page.next_cursor : undefined;
              } while (startCursor);
              return allResults;
            }

            // ========================================
            // 功能 1：自動建立 Branch
            // ========================================
            console.log('=== 功能 1：自動建立 Branch ===');

            const data = await queryNotionDb(databaseId, {
              and: [
                { or: [
                  { property: '任務狀態', status: { equals: 'NOT STARTED' } },
                  { property: '任務狀態', status: { equals: 'DEV IN PROGRESS' } }
                ]},
                { property: 'GitHub Branch', rich_text: { is_empty: true } },
                { property: 'GitHub Repo', select: { equals: repoName } },
                { property: 'Card Type', select: { equals: 'Repo Execution' } }
              ]
            });
            console.log(`[Create Branch] Found ${data.length} tasks for ${repoName}`);

            // Cache default branch info (avoid repeated API calls inside loop)
            const repoInfo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const defaultBranchName = repoInfo.data.default_branch;
            const defaultBranchRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${defaultBranchName}`
            });
            const defaultBranchSha = defaultBranchRef.data.object.sha;

            for (const page of data) {
              const taskIdObj = page.properties['Task ID'];
              const taskId = taskIdObj?.unique_id ? 
                `${taskIdObj.unique_id.prefix}-${taskIdObj.unique_id.number}` : null;
              const title = page.properties['項目']?.title?.[0]?.plain_text || 'untitled';
              const taskType = page.properties['任務類型']?.multi_select?.[0]?.name || '🔹 TASK';
              
              if (!taskId) {
                console.log('Skipping page without Task ID');
                continue;
              }
              
              console.log(`Processing: ${taskId} - ${title}`);

              // Check for Feature Hub parent → use parent's Task ID for branch naming
              let branchTaskId = taskId;
              const parentRelation = page.properties['Parent item']?.relation || [];
              if (parentRelation.length > 0) {
                const parentRes = await notionFetch(`https://api.notion.com/v1/pages/${parentRelation[0].id}`, {
                  headers: notionHeaders
                });
                if (parentRes.ok) {
                  const parentPage = await parentRes.json();
                  const parentCardType = parentPage.properties?.['Card Type']?.select?.name;
                  if (parentCardType === 'Feature Hub') {
                    const parentTaskIdObj = parentPage.properties['Task ID'];
                    const parentId = parentTaskIdObj?.unique_id ?
                      `${parentTaskIdObj.unique_id.prefix}-${parentTaskIdObj.unique_id.number}` : null;
                    if (parentId) {
                      branchTaskId = parentId;
                      console.log(`  Using Feature Hub Task ID: ${branchTaskId}`);
                    }
                  }
                }
              }

              // Claude API 翻譯
              let englishName = 'feature';
              try {
                const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: {
                    'x-api-key': anthropicKey,
                    'anthropic-version': '2023-06-01',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 100,
                    messages: [{
                      role: 'user',
                      content: `將以下中文功能名稱翻譯成簡短的英文 snake_case 格式，最多 30 字元，只回傳翻譯結果：\n\n${title}`
                    }]
                  })
                });
                
                const claudeData = await claudeResponse.json();
                englishName = claudeData.content?.[0]?.text?.trim()
                  .toLowerCase()
                  .replace(/[^a-z0-9_]/g, '_')
                  .replace(/_+/g, '_')
                  .replace(/^_+|_+$/g, '')
                  .substring(0, 30) || 'feature';
              } catch (e) {
                console.log(`Translation failed: ${e.message}`);
              }
              
              // Branch type
              let branchType = 'feat';
              if (taskType.includes('BUG')) branchType = 'fix';
              else if (taskType.includes('專案')) branchType = 'project';
              
              const branchName = `${branchType}/${branchTaskId}_${englishName}`;
              console.log(`Creating branch: ${branchName}`);
              
              // Create branch (using cached default branch SHA)
              try {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/heads/${branchName}`,
                  sha: defaultBranchSha
                });
                
                console.log(`Branch created: ${branchName}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Branch already exists: ${branchName}`);
                } else {
                  console.error(`Failed to create branch ${branchName}: ${e.message}`);
                  continue;
                }
              }
              
              // Update Notion
              const notionRes = await notionFetch(`https://api.notion.com/v1/pages/${page.id}`, {
                method: 'PATCH', headers: notionHeaders,
                body: JSON.stringify({
                  properties: {
                    'GitHub Branch': { rich_text: [{ text: { content: branchName } }] }
                  }
                })
              });
              if (notionRes.ok) console.log(`Updated Notion with branch: ${branchName}`);
              else console.error(`Failed to update Notion:`, await notionRes.json());
            }
            
            // ========================================
            // 功能 2：Function Review 失敗通知
            // ========================================
            console.log('=== 功能 2：Function Review 失敗通知 ===');
            
            const failedData = await queryNotionDb(databaseId, {
              and: [
                { property: '任務狀態', status: { equals: 'FUNC REVIEW FAILED' } },
                { property: 'GitHub Repo', select: { equals: repoName } },
                { property: 'Card Type', select: { equals: 'Repo Execution' } }
              ]
            });
            console.log(`[Func Review Failed] Found ${failedData.length} tasks for ${repoName}`);
            
            for (const page of failedData) {
              const taskIdObj = page.properties['Task ID'];
              const taskId = taskIdObj?.unique_id ?
                `${taskIdObj.unique_id.prefix}-${taskIdObj.unique_id.number}` : null;
              const title = page.properties['項目']?.title?.[0]?.plain_text || 'untitled';
              const developers = page.properties['Developer']?.people || [];
              const assignees = page.properties['指派給']?.people || [];
              const prUrl = page.properties['GitHub PR']?.url || '';

              // 優先通知 Developer，fallback 到指派給
              const notifyUsers = developers.length > 0 ? developers : assignees;

              console.log(`Processing failed review: ${taskId} - ${title}`);

              // 發送通知給 Developer
              if (notifyUsers.length > 0) {
                const richText = [];

                for (let i = 0; i < notifyUsers.length; i++) {
                  richText.push({
                    type: 'mention',
                    mention: {
                      type: 'user',
                      user: { id: notifyUsers[i].id }
                    }
                  });
                  if (i < notifyUsers.length - 1) {
                    richText.push({ type: 'text', text: { content: ' ' } });
                  }
                }

                richText.push({
                  type: 'text',
                  text: { content: ` Function Review 未通過，請進行調整後重新開 PR\n原 PR: ${prUrl}` }
                });

                const commentResponse = await notionFetch('https://api.notion.com/v1/comments', {
                  method: 'POST', headers: notionHeaders,
                  body: JSON.stringify({ parent: { page_id: page.id }, rich_text: richText })
                });

                if (commentResponse.ok) {
                  console.log(`Notified developers: ${notifyUsers.map(u => u.name || u.id).join(', ')}`);
                } else {
                  const error = await commentResponse.json();
                  console.error('Failed to add comment:', error);
                }
              }

              // 把狀態改回 DEV IN PROGRESS，指派給改為 Developer（保留 PR 欄位供參考）
              const updateProps = {
                '任務狀態': { status: { name: 'DEV IN PROGRESS' } }
              };

              // 把指派給改為 Developer
              if (developers.length > 0) {
                updateProps['指派給'] = { people: developers.map(d => ({ id: d.id })) };
              }

              const resetRes = await notionFetch(`https://api.notion.com/v1/pages/${page.id}`, {
                method: 'PATCH', headers: notionHeaders,
                body: JSON.stringify({ properties: updateProps })
              });
              if (resetRes.ok) console.log(`Reset status to DEV IN PROGRESS, assigned to Developer: ${taskId}`);
              else console.error(`Failed to reset status:`, await resetRes.json());
            }

            // NOTE: Feature Hub cascades (FUNC REVIEW FAILED, DONE, ABANDONED) moved to
            // notion-review-fix-task-scheduler.yml to avoid N-fold duplicate execution per repo

            // ========================================
            // 功能 3：為 Fix Task 建立修復分支
            // ========================================
            const fixTaskDbId = process.env.FIX_TASK_DB_ID;
            if (!fixTaskDbId) {
              console.log('=== 功能 3：跳過（FIX_TASK_DB_ID 未設定）===');
            } else {
              console.log('=== 功能 3：為 Fix Task 建立修復分支 ===');

              // 3a. 建立修復分支（只處理 Open/Fixing 且無 Fix Branch 的）
              const fixTaskData = await queryNotionDb(fixTaskDbId, {
                and: [
                  { property: 'GitHub Repo', select: { equals: repoName } },
                  { property: 'Fix Branch', rich_text: { is_empty: true } },
                  { or: [
                    { property: '狀態', status: { equals: 'Open' } },
                    { property: '狀態', status: { equals: 'Fixing' } }
                  ]}
                ]
              });
              console.log(`[Fix Task Branch] Found ${fixTaskData.length} Fix Tasks for ${repoName}`);

              for (const fixTask of fixTaskData) {
                const fixTaskIdObj = fixTask.properties['Fix Task ID'];
                const fixTaskId = fixTaskIdObj?.unique_id ?
                  `${fixTaskIdObj.unique_id.prefix}-${fixTaskIdObj.unique_id.number}` : null;
                const fixTitle = fixTask.properties['修復項目']?.title?.[0]?.plain_text || 'fix';

                if (!fixTaskId) {
                  console.log('Skipping Fix Task without ID');
                  continue;
                }

                console.log(`Processing Fix Task: ${fixTaskId} - ${fixTitle}`);

                // 翻譯修復項目名稱
                let englishName = 'fix';
                try {
                  const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                      'x-api-key': anthropicKey,
                      'anthropic-version': '2023-06-01',
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      model: 'claude-haiku-4-5-20251001',
                      max_tokens: 100,
                      messages: [{
                        role: 'user',
                        content: `將以下中文修復描述翻譯成簡短的英文 snake_case 格式，最多 30 字元，只回傳翻譯結果：\n\n${fixTitle}`
                      }]
                    })
                  });

                  const claudeData = await claudeResponse.json();
                  englishName = claudeData.content?.[0]?.text?.trim()
                    .toLowerCase()
                    .replace(/[^a-z0-9_]/g, '_')
                    .replace(/_+/g, '_')
                    .replace(/^_+|_+$/g, '')
                    .substring(0, 30) || 'fix';
                } catch (e) {
                  console.log(`Translation failed: ${e.message}`);
                }

                const fixBranchName = `fix/${fixTaskId}_${englishName}`;
                console.log(`Creating fix branch: ${fixBranchName}`);

                // 從 staging 分支切出（Fix Task 修的是 staging 上的問題）
                try {
                  let baseBranch = 'staging';
                  try {
                    await github.rest.git.getRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/staging`
                    });
                  } catch (e) {
                    // 如果 staging 不存在，用 default branch
                    const repoInfo = await github.rest.repos.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo
                    });
                    baseBranch = repoInfo.data.default_branch;
                    console.log(`staging branch not found, using ${baseBranch}`);
                  }

                  const ref = await github.rest.git.getRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${baseBranch}`
                  });

                  await github.rest.git.createRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `refs/heads/${fixBranchName}`,
                    sha: ref.data.object.sha
                  });

                  console.log(`Fix branch created: ${fixBranchName} (from ${baseBranch})`);
                } catch (e) {
                  if (e.status === 422) {
                    console.log(`Fix branch already exists: ${fixBranchName}`);
                  } else {
                    console.error(`Failed to create fix branch: ${e.message}`);
                    continue;
                  }
                }

                // 回寫 Fix Branch + 狀態 Fixing 到 Notion
                const fixNotionRes = await notionFetch(`https://api.notion.com/v1/pages/${fixTask.id}`, {
                  method: 'PATCH', headers: notionHeaders,
                  body: JSON.stringify({
                    properties: {
                      'Fix Branch': { rich_text: [{ text: { content: fixBranchName } }] },
                      '狀態': { status: { name: 'Fixing' } }
                    }
                  })
                });
                if (fixNotionRes.ok) console.log(`Updated Fix Task with branch: ${fixBranchName}`);
                else console.error(`Failed to update Fix Task:`, await fixNotionRes.json());
              }

              // 3b. Won't Fix 且有 Fix Branch → 通知 reviewer 刪除分支
              const wontFixData = await queryNotionDb(fixTaskDbId, {
                and: [
                  { property: 'GitHub Repo', select: { equals: repoName } },
                  { property: 'Fix Branch', rich_text: { is_not_empty: true } },
                  { property: '狀態', status: { equals: "Won't Fix" } }
                ]
              });
              console.log(`[Fix Task Cleanup] Found ${wontFixData.length} Won't Fix tasks with branches`);

              for (const wfTask of wontFixData) {
                const wfBranch = wfTask.properties['Fix Branch']?.rich_text?.[0]?.plain_text || '';
                const wfTitle = wfTask.properties['修復項目']?.title?.[0]?.plain_text || '';
                const wfFixers = wfTask.properties['修復者']?.people || [];

                // Get Tech Reviewer from Repo Execution
                let reviewerToNotify = [];
                const reRelation = wfTask.properties['Repo Execution']?.relation || [];
                if (reRelation.length > 0) {
                  const reRes = await notionFetch(`https://api.notion.com/v1/pages/${reRelation[0].id}`, {
                    headers: notionHeaders
                  });
                  if (reRes.ok) {
                    const rePage = await reRes.json();
                    reviewerToNotify = rePage.properties?.['Tech Reviewer']?.people || [];
                    if (reviewerToNotify.length === 0) {
                      const parentRel = rePage.properties?.['Parent item']?.relation || [];
                      if (parentRel.length > 0) {
                        const parentRes = await notionFetch(`https://api.notion.com/v1/pages/${parentRel[0].id}`, {
                          headers: notionHeaders
                        });
                        if (parentRes.ok) {
                          const parentPage = await parentRes.json();
                          if (parentPage.properties?.['Card Type']?.select?.name === 'Feature Hub') {
                            reviewerToNotify = parentPage.properties?.['Tech Reviewer']?.people || [];
                          }
                        }
                      }
                    }
                  }
                }

                const notifyPeople = reviewerToNotify.length > 0 ? reviewerToNotify : wfFixers;
                if (notifyPeople.length > 0) {
                  const richText = [];
                  for (let i = 0; i < notifyPeople.length; i++) {
                    richText.push({ type: 'mention', mention: { type: 'user', user: { id: notifyPeople[i].id } } });
                    if (i < notifyPeople.length - 1) richText.push({ type: 'text', text: { content: ' ' } });
                  }
                  richText.push({ type: 'text', text: { content: ` Fix Task「${wfTitle}」已標記 Won't Fix，請刪除分支：${wfBranch}` } });

                  await notionFetch('https://api.notion.com/v1/comments', {
                    method: 'POST', headers: notionHeaders,
                    body: JSON.stringify({ parent: { page_id: wfTask.id }, rich_text: richText })
                  });
                  console.log(`Notified to delete branch ${wfBranch} for Won't Fix task`);
                }

                // Clear Fix Branch to avoid re-notifying
                const clearRes = await notionFetch(`https://api.notion.com/v1/pages/${wfTask.id}`, {
                  method: 'PATCH', headers: notionHeaders,
                  body: JSON.stringify({
                    properties: { 'Fix Branch': { rich_text: [] } }
                  })
                });
                if (clearRes.ok) console.log(`Cleared Fix Branch for Won't Fix task`);
                else console.error(`Failed to clear Fix Branch:`, await clearRes.json());
              }
            }

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Notion Create Branch workflow failed for repo: ${{ inputs.repo_name }}. Check logs above."